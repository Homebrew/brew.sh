    question: "\U0001F527 Hvad gør Homebrew?"
    what: Homebrew installerer <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">de kommandolinjeværktøjer og applikationer, du har brug
      for</a> på tværs af macOS, Linux og WSL.
    how: 'Homebrew vil ikke installere filer uden for dens <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">præfiks</a>.
      Den installerer hver pakke i sin egen <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      inde i <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>
      og symlinker derefter sine filer til prefix, stien hvor Homebrew er installeret:
      <code>/opt/homebrew</code> på Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      på Linux/WSL og <code>/usr/local</code> på macOS Intel.'
    prefix: Homebrew vil ikke installere filer udenfor sit område, og du kan placere
      en Homebrew-installation hvor end du vil.
    createpackages: Homebrew pakker er <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">formler
      og fade</a>.
    hack: Under hjelmen er det bare Git og Ruby, så hack løs &ndash; velvidende om
      at du let kan annulere dine ændringer og flette andres rettelser ind.
    formula: 'Homebrew formularer er simple Rubyscripts:'
    editor: åbner i $EDITOR!
    complement: Homebrew komplimenterer macOS. Installer dine RubyGems med <code>gem</code>
      og pakkerne de er afhængige af med <code>brew</code>.
    caskinstall: “To install, drag this icon…” no more. <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>
      installs macOS apps, fonts and plugins and other non-open source software.
    caskcreate: Making a cask is as simple as creating a formula.
