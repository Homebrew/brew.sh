    formulae_title: "\U0001F4E6 Homebrew-pakker"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      er pakkedefinitioner, der bygger kommandolinjeværktøjer, biblioteker og tjenester
      fra opstrøms kildekode.
    formulae_help: Formulae i <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      kræver menneskelig gennemgang, før de accepteres, ændres eller opdateres og
      skal være open source-software med en <a href="https://wiki.debian.org/DFSGLicenses">Debian
      Free Software Guidelines</a>-kompatibel licens (se kravene i <a href="https://docs.brew.sh/Acceptable-Formulae">Acceptable
      Formulae</a>). De vedligeholdes af Homebrews vedligeholdere og bidragydere.
      Opret formulae med hjælp fra <a href="https://docs.brew.sh/Formula-Cookbook">Formula
      Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      er pakkedefinitioner, der installerer opstrøms forudbyggede binære filer såsom
      applikationer, skrifttyper og plugins.
    casks_help: Nogle casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      uden for Homebrew, så brug <code>brew upgrade --greedy</code> hvis du også vil
      have Homebrew til at opdatere dem. Casks i <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      kræver menneskelig gennemgang, før de accepteres, ændres eller opdateres og
      skal opfylde kravene i <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Fade</a>. De vedligeholdes af Homebrews vedligeholdere og bidragydere. Opret
      casks med hjælp fra <a href="https://docs.brew.sh/Cask-Cookbook">Cask Cookbook</a>.
    taps: Andre pakkedepoter kaldes <a href="https://docs.brew.sh/Taps">taps</a>;
      de lader enhver vedligeholde deres egne formulae og casks uden for de officielt
      understøttede arkiver. Læs, hvordan <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a> virker, før du bruger ikke-officielle taps, og lær derefter, hvordan
      du <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">opretter
      og vedligeholder en tap</a>.
    bundle_title: "\U0001F4CB Homebrew Bundle-pakke"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      er deklarativ: den bruger en <code>Brewfile</code> til at beskrive den tilstand,
      du ønsker. Kør <code>brew bundle</code> for at installere manglende afhængigheder,
      opdatere forældede og holde projekt- eller maskinopsætningen gentagelig.'
    bundle_types: Homebrew Bundle understøtter formler, fade, taps, Mac App Store-apps,
