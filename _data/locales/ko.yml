      donate_summary: Homebrew은 직원이 아닌 자원봉사자들이 전적으로 운영하는 비영리 프로젝트입니다. 지속적인 통합과 프로젝트의
        향후 개선을 위한 소프트웨어, 하드웨어 및 호스팅 비용을 지불하려면 귀하의 자금이 필요합니다. 모든 기부금은 사용자를 위해 더 나은
        Homebrew을 만드는 데 사용됩니다. <a href="https://github.com/sponsors/Homebrew">GitHub
