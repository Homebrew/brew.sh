    search: 검색
    language: 언어
    question: "\U0001F527 Homebrew은(는) 무엇을 하나요?"
    what: Homebrew는 <a href="https://formulae.brew.sh/formula/" title="List of Homebrew
      packages">필요한 명령줄 도구와 애플리케이션</a>을 macOS, Linux 및 WSL에 설치합니다.
    how: Homebrew은 <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefix</a>
      외부에 파일을 설치하지 않습니다. 각 패키지를 <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>
      내부의 자체 <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>에
      설치한 다음 해당 파일을 Homebrew가 설치된 경로인 prefix에 심볼릭 링크합니다. Apple Silicon의 경우 <code>/opt/homebrew</code>,
      <code>/home/linuxbrew/.linuxbrew</code> Linux/WSL 및 macOS Intel의 <code>/usr/local</code>.
    prefix: Homebrew는 전용 디렉토리 외부에 설치하는 일은 없지만 원하는 위치에 설치할 수도 있습니다.
    createpackages: Homebrew 패키지는 <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">formulae
      및 Casks</a>입니다.
    hack: 모두 Git과 Ruby 기반으로 되어 있으며, 쉽게 수정을 되돌리거나 원본 코드의 수정사항을 병합하세요.
    formula: 'Homebrew formulae는 간단한 Ruby 스크립트입니다:'
    editor: "$EDITOR 에서 열음!"
    complement: Homebrew는 macOS(또는 Linux 시스템)의 개발 환경을 보완해줍니다. <code>gem</code> 명령으로
      RubyGems를, <code>brew</code> 명령으로 RubyGems의 의존성 모듈을 설치하세요.
    caskinstall: 더 이상 “설치하기 위해 이 파일을… 에 끌어다 놓기” 할 필요 없습니다. <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>
      명령으로 macOS 앱, 폰트, 플러그인, 오픈소스가 아닌 소프트웨어를 설치할 수 있습니다.
    caskcreate: cask를 만드는 것은 formula(공식)을 만드는 것 만큼 간단합니다.
    install:
