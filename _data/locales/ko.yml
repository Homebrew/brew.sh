    formulae_title: "\U0001F4E6 Homebrew 패키지"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>은
      업스트림 소스 코드에서 명령줄 도구, 라이브러리 및 서비스를 구축하는 패키지 정의입니다.
    formulae_help: <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>의
      Formulae은 승인, 변경 또는 업데이트되기 전에 사람의 검토가 필요하며 <a href="https://wiki.debian.org/DFSGLicenses">Debian
      자유 소프트웨어 지침</a> 호환 라이센스가 있는 오픈 소스 소프트웨어여야 합니다(<a href="https://docs.brew.sh/Acceptable-Formulae">허용
      공식</a>의 요구 사항 참조). Homebrew의 관리자와 기여자가 관리합니다. <a href="https://docs.brew.sh/Formula-Cookbook">Formula
      Cookbook</a>의 도움을 받아 formulae을 만듭니다.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>은
      애플리케이션, 글꼴, 플러그인과 같은 사전 구축된 업스트림 바이너리를 설치하는 패키지 정의입니다.
    casks_help: Homebrew 외부의 일부 casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>이므로
      Homebrew에서도 업데이트하려면 <code>brew 업그레이드 --greedy</code>을 사용하세요. <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>의
      Casks은 승인, 변경 또는 업데이트되기 전에 사람의 검토가 필요하며 <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Casks</a>의 요구 사항을 충족해야 합니다. Homebrew의 관리자와 기여자가 관리합니다. <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      Cookbook</a>의 도움을 받아 casks을 생성하세요.
    taps: 다른 패키지 저장소는 <a href="https://docs.brew.sh/Taps">taps</a>이라고 합니다. 공식적으로 지원되는
      저장소 외부에서 누구나 자신의 formulae 및 casks을 유지할 수 있습니다. 비공식 taps을 사용하기 전에 <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a>의 작동 방식을 읽어보고 <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">tap</a>을
      생성하고 유지하는 방법을 알아보세요.
    bundle_title: "\U0001F4CB Homebrew Bundle 패키지"
    bundle: <a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>은
      선언적입니다. <code>Brewfile</code>을 사용하여 원하는 상태를 설명합니다. <code>brew Bundle</code>을
      실행하여 누락된 종속성을 설치하고, 오래된 종속성을 업데이트하고, 프로젝트 또는 시스템 설정을 반복 가능하게 유지하세요.
    bundle_types: Homebrew Bundle는 formulae, casks, taps, Mac App Store 앱, WSL의 WinGet
      패키지, VSCode 확장, Go 패키지, Cargo 패키지, uv 도구, Flatpak 패키지, krew kubectl 플러그인을 지원하고
      백그라운드 서비스를 시작합니다. <code>양조 서비스</code>.
