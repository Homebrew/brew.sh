      donate_summary: Homebrew é un proxecto sen ánimo de lucro dirixido integramente
        por voluntarios, non por empregados. Necesitamos os teus fondos para pagar
        software, hardware e hospedaxe en torno á integración continua e melloras
        futuras do proxecto. Cada doazón destinarase a mellorar Homebrew para os nosos
