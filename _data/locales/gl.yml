    question: "\U0001F527 Que fai Homebrew?"
    what: Homebrew instala <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">as ferramentas e aplicacións de liña de comandos que necesitas</a>
      en macOS, Linux e WSL.
    how: 'Homebrew non instalará ficheiros fóra do seu <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefixo</a>.
      Instala cada paquete no seu propio <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      dentro do <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>,
      logo enlaza simbólicamente os seus ficheiros no prefix, o camiño onde está instalado
      Homebrew: <code>/opt/homebrew</code> en Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      en Linux/WSL e <code>/usr/local</code> en macOS Intel.'
    prefix: Homebrew non vai instalar ficheiros fóra do seu prefixo, e ti podes poñer
      a instalación de Homebrew installation onde queiras.
    createpackages: Os paquetes Homebrew son <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">fórmulas
      e barricas</a>.
    hack: Por embaixo é todo Git e Ruby, asi que fedella sabendo que podes voltar
      atrás doadamente as túas modificacións e integrar actualizacións.
    formula: 'As fórmulas de Homebrew son simples <i>scripts</i> de Ruby:'
    editor: ábrese co $EDITOR!
    complement: Homebrew complementa a macOS. Instala as túas <i>RubyGems</i> con
      <code>gem</code>, e as súas dependencias con <code>brew</code>.
    caskinstall: “To install, drag this icon…” no more. <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>
      installs macOS apps, fonts and plugins and other non-open source software.
    caskcreate: Making a cask is as simple as creating a formula.
    install:
      install: "\U0001F680 Instalar Homebrew"
      paste: Pega iso no terminal macOS, un shell Linux ou WSL.
      what: O guión explica o que fará e despois fai unha pausa antes de facelo. Lea
        sobre outras <a href="https://docs.brew.sh/Installation">opcións de instalación</a>.
      pkginstaller: Se estás en macOS, proba o noso instalador <code>.pkg</code> para
        instalacións interactivas ou sen supervisión de MDM.
      githubrelease: Descárgueo desde a <a href="https://github.com/Homebrew/brew/releases/latest">última versión de Homebrew en GitHub</a>.
      supported: Homebrew <a href="https://docs.brew.sh/Support-Tiers">soporta</a>
        macOS (Sonoma 14 e máis recentes), Linux e Windows Subsystem for Linux (WSL).
