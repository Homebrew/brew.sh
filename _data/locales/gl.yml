    formulae_title: "\U0001F4E6 Paquetes de Homebrew"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      son definicións de paquetes que constrúen ferramentas de liña de comandos, bibliotecas
      e servizos a partir do código fonte.
    formulae_help: Formulae en <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      requiren revisión humana antes de ser aceptados, cambiados ou actualizados e
      deben ser software de código aberto cunha licenza compatible con <a href="https://wiki.debian.org/DFSGLicenses">Debian
      Free Software Guidelines</a> (consulte os requisitos en <a href="https://docs.brew.sh/Acceptable-Formulae">Fórmulas
      aceptables</a>). Mantéñenos os mantedores e colaboradores de Homebrew. Crea
      formulae coa axuda do <a href="https://docs.brew.sh/Formula-Cookbook">Libro
      de receitas de fórmulas</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      son definicións de paquetes que instalan binarios preconstruídos ascendentes
      como aplicacións, fontes e complementos.
    casks_help: Algúns casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">actualización
      automática</a> fóra de Homebrew, así que usa <code>brew upgrade --greedy</code>
      se queres que Homebrew tamén os actualice. Casks en <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      requiren unha revisión humana antes de ser aceptadas, modificadas ou actualizadas
      e deben cumprir os requisitos de <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Casks</a>. Mantéñenos os mantedores e colaboradores de Homebrew. Crea casks
      coa axuda do <a href="https://docs.brew.sh/Cask-Cookbook">Cask Cookbook</a>.
    taps: Outros repositorios de paquetes chámanse <a href="https://docs.brew.sh/Taps">taps</a>;
      permiten que calquera manteña os seus propios formulae e casks fóra dos repositorios
      admitidos oficialmente. Le como funciona <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a> antes de usar taps non oficial e, a continuación, aprende a <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">crear
      e manter un toque</a>.
    bundle_title: "\U0001F4CB Paquete Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      é declarativo: usa un <code>Brewfile</code> para describir o estado que queres.
      Executar <code>brew bundle</code> para instalar as dependencias que faltan,
      actualizar as desactualizadas e manter repetible a configuración do proxecto
      ou da máquina.'
    bundle_types: Homebrew Bundle admite as aplicacións formulae, casks, taps, Mac
      App Store, paquetes WinGet en extensións WSL, VSCode, paquetes Go, paquetes
      Cargo, paquetes Cargo, paquetes Cargo, WinGet, WSL, VSCode krew kubectl complementos
      e iniciando servizos en segundo plano con <code>brew services</code>.
