        Patrocinadores</a>, <a href="https://opencollective.com/homebrew">Open Collective</a>
        ou <a href="https://www.patreon.com/homebrew">Patreon</a>. Homebrew está aloxado
        fiscalmente polo <a href="https://opencollective.com/opensource">Open Source
        Collective</a>.
