    question: "\U0001F527 Какво прави Homebrew?"
    what: Homebrew инсталира <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">инструментите и приложенията от командния ред, от които
      се нуждаете</a> в macOS, Linux и WSL.
    how: 'Homebrew няма да инсталира файлове извън своя <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">префикс</a>.
      Той инсталира всеки пакет в свой собствен <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      вътре в <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>,
      след което символизира своите файлове в prefix, пътя, където е инсталиран Homebrew:
      <code>/opt/homebrew</code> на Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      на Linux/WSL и <code>/usr/local</code> на macOS Intel.'
    prefix: Можете да инсталирате Homebrew където пожелаете. Той няма да инсталира
