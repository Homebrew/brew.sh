    formulae_title: "\U0001F4E6 Пакети на Homebrew"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      са дефиниции на пакети, които изграждат инструменти от командния ред, библиотеки
      и услуги от изходния код нагоре.
    formulae_help: Formulae в <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      изисква преглед от човек, преди да бъдат приети, променени или актуализирани
      и трябва да бъдат софтуер с отворен код с <a href="https://wiki.debian.org/DFSGLicenses">Debian
      Free Software Guidelines</a>-съвместим лиценз (вижте изискванията в <a href="https://docs.brew.sh/Acceptable-Formulae">Приемливи
      формули</a>). Те се поддържат от поддържащите и сътрудниците на Homebrew. Създайте
      formulae с помощта на <a href="https://docs.brew.sh/Formula-Cookbook">Formula
      Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      са дефиниции на пакети, които инсталират нагоре предварително изградени двоични
      файлове като приложения, шрифтове и добавки.
    casks_help: Някои casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">автоматично
      актуализиране</a> извън Homebrew, така че използвайте <code>brew надстройка
      --greedy</code>, ако искате Homebrew да ги актуализира също. Casks в <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      изискват проверка от човек, преди да бъдат приети, променени или актуализирани
      и трябва да отговарят на изискванията в <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Casks</a>. Те се поддържат от поддържащите и сътрудниците на Homebrew. Създайте
      casks с помощта на <a href="https://docs.brew.sh/Cask-Cookbook">Cask Cookbook</a>.
    taps: Други хранилища на пакети се наричат <a href="https://docs.brew.sh/Taps">taps</a>;
      те позволяват на всеки да поддържа свои собствени formulae и casks извън официално
      поддържаните хранилища. Прочетете как работи <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a>, преди да използвате неофициален taps, след което научете как да <a
      href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">създадете и поддържате
      tap</a>.
    bundle_title: "\U0001F4CB Пакет Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      е декларативен: той използва <code>Brewfile</code>, за да опише желаното от
      вас състояние. Стартирайте <code>brew bundle</code>, за да инсталирате липсващи
      зависимости, да актуализирате остарелите и да запазите повторяемостта на проекта
      или настройката на машината.'
    bundle_types: Homebrew Bundle поддържа formulae, casks, taps, Mac App Store приложения,
