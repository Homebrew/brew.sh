    formulae_title: "\U0001F4E6 แพ็กเกจ Homebrew"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      คือคำจำกัดความของแพ็กเกจที่สร้างเครื่องมือบรรทัดคำสั่ง ไลบรารี และบริการจากซอร์สโค้ดอัปสตรีม
    formulae_help: Formulae ใน <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      ต้องมีการตรวจสอบโดยเจ้าหน้าที่ก่อนที่จะได้รับการยอมรับ เปลี่ยนแปลง หรืออัปเดต
      และต้องเป็นซอฟต์แวร์โอเพ่นซอร์สที่มี <a href="https://wiki.debian.org/DFSGLicenses">Debian
      Free Software Guidelines</a>- ใบอนุญาตที่เข้ากันได้กับ (ดูข้อกำหนดใน <a href="https://docs.brew.sh/Acceptable-Formulae">Acceptable
      Formulae</a>) สิ่งเหล่านี้ได้รับการดูแลโดยผู้ดูแลและผู้มีส่วนร่วมของ Homebrew
      สร้าง formulae ด้วยความช่วยเหลือจาก <a href="https://docs.brew.sh/Formula-Cookbook">ตำราสูตร</a>
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      คือคำจำกัดความของแพ็กเกจที่ติดตั้งอัปสตรีมไบนารีที่สร้างไว้ล่วงหน้า เช่น แอปพลิเคชัน
      แบบอักษร และปลั๊กอิน
    casks_help: casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      บางตัวอยู่นอก Homebrew ดังนั้นให้ใช้ <code>brew upgrade --greedy</code> หากคุณต้องการ
      Homebrew อัปเดตด้วยเช่นกัน Casks ใน <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      ต้องมีการตรวจสอบโดยเจ้าหน้าที่ก่อนที่จะได้รับการยอมรับ เปลี่ยนแปลง หรืออัปเดต
      และต้องเป็นไปตามข้อกำหนดใน <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Casks</a> สิ่งเหล่านี้ได้รับการดูแลโดยผู้ดูแลและผู้มีส่วนร่วมของ Homebrew สร้าง
      casks ด้วยความช่วยเหลือจาก <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      Cookbook</a>
    taps: ที่เก็บแพ็กเกจอื่นเรียกว่า <a href="https://docs.brew.sh/Taps">taps</a>;
      พวกเขาอนุญาตให้ใครก็ตามดูแลรักษา formulae และ casks ของตนเองนอกพื้นที่เก็บข้อมูลที่ได้รับการสนับสนุนอย่างเป็นทางการ
      อ่านวิธีการทำงานของ <a href="https://docs.brew.sh/Tap-Trust">tap trust</a> ก่อนที่จะใช้
      taps ที่ไม่เป็นทางการ จากนั้นเรียนรู้วิธี <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">สร้างและดูแลรักษา
      tap</a>
    bundle_title: "\U0001F4CB แพ็กเกจ Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      เป็นการประกาศ: ใช้ <code>Brewfile</code> เพื่ออธิบายสถานะที่คุณต้องการ รัน <code>brew
      Bundle</code> เพื่อติดตั้งการขึ้นต่อกันที่ขาดหายไป อัปเดตอันที่ล้าสมัย และทำให้การตั้งค่าโปรเจ็กต์หรือเครื่องสามารถทำซ้ำได้'
    bundle_types: Homebrew Bundle รองรับแอป formulae, casks, taps, Mac App Store,
      แพ็คเกจ WinGet บน WSL, ส่วนขยาย VSCode, แพ็คเกจ Go, แพ็คเกจ Cargo, เครื่องมือ
      uv, แพ็คเกจ Flatpak, ปลั๊กอิน krew kubectl และการเริ่มต้นบริการพื้นหลังด้วย
      <code>บริการเบียร์</code>
