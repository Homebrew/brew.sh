  pagecontent:
    search: ค้นหา
    language: ภาษา
    question: ตอบรับ Homebrew ทำอะไร?
    what: Homebrew ติดตั้ง <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">เครื่องมือบรรทัดคำสั่งและแอปพลิเคชันที่คุณต้องการ</a>
      ทั่วทั้ง macOS, Linux และ WSL
    how: 'Homebrew จะไม่ติดตั้งไฟล์ภายนอก <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefix</a>
      มันจะติดตั้งแต่ละแพ็คเกจลงใน <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      ของตัวเองภายใน <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>
      จากนั้นเชื่อมโยงไฟล์ของมันลงใน prefix ซึ่งเป็นเส้นทางที่ติดตั้ง Homebrew: <code>/opt/homebrew</code>
      บน Apple Silicon <code>/home/linuxbrew/.linuxbrew</code> บน Linux/WSL และ <code>/usr/local</code>
      บน macOS Intel'
    prefix: Homebrew จะไม่มีการติดตั้งไฟล์ใด ๆ ภายนอกไดเรคทอรี่นั้น และคุณสามารถเลือกได้ว่าจะให้
      Homebrew ติดตั้งไปที่ไดเรคทอรีใด
    createpackages: แพ็คเกจ Homebrew คือ <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">formulae
      และถัง</a>
    hack: ภายในทำงานด้วย Git และ Ruby เพราะฉะนั้นแล้ว คุณเองก็สามารถทำการแก้ไขจนพอใจได้
      จากนั้นจึง merge การแก้ไขนั้นไปที่ upstream
    formula: 'Homebrew formula เป็นแค่สคริปภาษา Ruby ง่ายๆ:'
    editor: opens in $EDITOR!
    complement: Homebrew เติมเต็มให้กับ macOS. ติดตั้ง gem ทั้งหลายด้วย <code>gem</code>
      ส่วน dependency ต่าง ๆ ติดตั้งด้วย <code>brew</code>
    caskinstall: “ลากไอคอน เพื่อติดตั้ง” จะหมดไป <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>  สามารถติดตั้งแอพพลิเคชั่น
      macOS, ฟ้อนต์, ส่วนเสริมต่างๆ หรือแม้กระทั่ง non-open source ซอฟแวร์ได้เลย
    caskcreate: การสร้าง Cask ใหม่สามารถทำได้ง่ายๆ
    install:
