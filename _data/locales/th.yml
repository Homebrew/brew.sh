      paste: วางสิ่งนั้นลงในเทอร์มินัล macOS เชลล์ Linux หรือ WSL
      what: สคริปต์จะอธิบายว่ามันจะทำอะไรและหยุดชั่วคราวก่อนที่จะทำ อ่านเกี่ยวกับ
        <a href="https://docs.brew.sh/Installation">ตัวเลือกการติดตั้ง</a> อื่นๆ
      pkginstaller: หากคุณใช้ macOS ให้ลองใช้โปรแกรมติดตั้ง <code>.pkg</code> ของเราสำหรับการติดตั้ง
        MDM แบบโต้ตอบหรือแบบอัตโนมัติ
      githubrelease: ดาวน์โหลดได้จาก <a href="https://github.com/Homebrew/brew/releases/latest">Homebrew GitHub release ล่าสุด</a>
      supported: Homebrew <a href="https://docs.brew.sh/Support-Tiers">supports</a>
