    question: "\U0001F527 Mit csinál a Homebrew?"
    what: Homebrew telepíti <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">a szükséges parancssori eszközöket és alkalmazásokat</a>
      a macOS, Linux és WSL között.
    how: 'A Homebrew nem telepít a <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">előtagján</a> kívüli fájlokat. Mindegyik csomagot a saját <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>-jébe telepíti a <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>-on belül, majd szimbolikus linkekkel kapcsolja a fájljait a prefixbe, a Homebrew telepítési útvonalába: <code>/opt/homebrew</code> Apple Siliconon, <code>/home/linuxbrew/.linuxbrew</code> Linux/WSL-en és <code>/usr/local</code> macOS Intelen.'
    prefix: A Homebrew nem telepít fájlokat az előre meghatározott útvonalon kívül,
      és a Homebrew telepítésedet oda helyezheted, ahová csak szeretnéd.
