    formulae_title: "\U0001F4E6 Homebrew csomagok"
    formulae: A <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Képletek</a>
      olyan csomagdefiníciók, amelyek parancssori eszközöket, könyvtárakat és szolgáltatásokat
      építenek fel upstream forráskódból.
    formulae_help: A Formulae a <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>-ban
      emberi felülvizsgálatot igényel, mielőtt elfogadják, módosítják vagy frissítik
      őket, és nyílt forráskódú szoftvernek kell lennie <a href="https://wiki.debian.org/DFSGLicenses">Debian
      Free Software Guidelines</a>-kompatibilis licenccel (lásd a követelményeket
      a <a href="https://docs.brew.sh/Acceptable-Formulae">Acceptable Formulae</a>-ban).
      Karbantartásukat a Homebrew fenntartói és közreműködői végzik. A formulae létrehozása
      a <a href="https://docs.brew.sh/Formula-Cookbook">Formula Cookbook</a> segítségével.
    casks: A <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      olyan csomagdefiníciók, amelyek előre beépített bináris fájlokat, például alkalmazásokat,
      betűtípusokat és bővítményeket telepítenek.
    casks_help: Néhány casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">automatikus
      frissítés</a> a Homebrew-on kívül, ezért használja a <code>brew upgrade --greedy</code>
      funkciót, ha azt is szeretné, hogy a Homebrew frissítse őket. A Casks a <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>-ban
      emberi felülvizsgálatot igényel, mielőtt elfogadják, módosítják vagy frissítik
      őket, és meg kell felelniük az <a href="https://docs.brew.sh/Acceptable-Casks">Elfogadható
      hordók</a> követelményeinek. Karbantartásukat a Homebrew fenntartói és közreműködői
      végzik. A casks létrehozása a <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      Cookbook</a> segítségével.
    taps: Az egyéb csomagtárolók neve <a href="https://docs.brew.sh/Taps">taps</a>;
      bárki karbantarthatja saját formulae és casks a hivatalosan támogatott tárolókon
      kívül. A nem hivatalos taps használata előtt olvassa el a <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a> működését, majd tanulja meg, hogyan <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">
      hozhat létre és karbantarthat egy tap</a>.
    bundle_title: "\U0001F4CB Homebrew Bundle csomag"
    bundle: 'A <a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      deklaratív: egy <code>Brewfile</code>-t használ a kívánt állapot leírására.
      Futtassa a <code>brew bundle</code> alkalmazást a hiányzó függőségek telepítéséhez,
      az elavultak frissítéséhez és a projekt- vagy gépbeállítás megismételhetőségének
      biztosításához.'
    bundle_types: A Homebrew Bundle támogatja a formulákat, hordókat, csapokat, Mac
      App Store alkalmazásokat, WinGet csomagokat WSL-n, VSCode-bővítményeket, Go-csomagokat,
      Cargo-csomagokat, uv-eszközöket, Flatpak-csomagokat, krew kubectl-bővítményeket
      és háttérszolgáltatások indítását <code>sörfőzési szolgáltatásokkal</code>.
