      <code>brew package</code>, aby zainstalować brakujące zależności, zaktualizować
      przestarzałe i zapewnić powtarzalność konfiguracji projektu lub komputera.'
    bundle_types: Homebrew Bundle obsługuje aplikacje formulae, casks, taps, Mac App
