    question: "\U0001F527 Co robi Homebrew?"
    what: Homebrew instaluje <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">narzędzia i aplikacje wiersza poleceń, których potrzebujesz</a>
      w macOS, Linux i WSL.
    how: 'Homebrew nie zainstaluje plików poza swoim <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefix</a>.
      Instaluje każdy pakiet w swoim własnym <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      wewnątrz <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>,
      następnie dowiązuje symbolicznie swoje pliki do prefix, ścieżka, w której zainstalowany
      jest Homebrew: <code>/opt/homebrew</code> na Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      na Linux/WSL i <code>/usr/local</code> na macOS Intel.'
    prefix: Homebrew nie zainstaluje plików spoza swojego prefiksu, a instalację Homebrew
      możesz przeprowadzić w dowolnym wybranym przez siebie miejscu.
