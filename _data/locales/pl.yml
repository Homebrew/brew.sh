      Formulae</a>). Są one utrzymywane przez opiekunów i współpracowników Homebrew.
      Utwórz formulae, korzystając z <a href="https://docs.brew.sh/Formula-Cookbook">Formula
      Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      to definicje pakietów, które instalują gotowe pliki binarne, takie jak aplikacje,
      czcionki i wtyczki.
    casks_help: Niektóre casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">automatyczna
      aktualizacja</a> poza Homebrew, więc użyj <code>brew upgrade --greedy</code>,
      jeśli chcesz, aby Homebrew je także zaktualizował. Casks w <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      wymagają przeglądu przez człowieka przed ich zaakceptowaniem, zmianą lub aktualizacją
      i muszą spełniać wymagania określone w <a href="https://docs.brew.sh/Acceptable-Casks">Akceptowalne
      beczki</a>. Są one utrzymywane przez opiekunów i współpracowników Homebrew.
      Stwórz casks, korzystając z <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      Cookbook</a>.
    taps: Inne repozytoria pakietów nazywane są <a href="https://docs.brew.sh/Taps">taps</a>;
      pozwalają każdemu utrzymywać własne formulae i casks poza oficjalnie obsługiwanymi
      repozytoriami. Przeczytaj, jak działa <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a>, zanim użyjesz nieoficjalnego taps, a następnie dowiedz się, jak <a
      href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">utworzyć i zarządzać
      tap</a>.
    bundle_title: "\U0001F4CB Pakiet Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
