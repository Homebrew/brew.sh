    question: "\U0001F527 Hva gjør Homebrew?"
    what: Homebrew installerer <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">kommandolinjeverktøyene og applikasjonene du trenger</a>
      på tvers av macOS, Linux og WSL.
    how: 'Homebrew vil ikke installere filer utenfor <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefikset</a>.
      Den installerer hver pakke i sin egen <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      inne i <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>,
      og symlinker deretter filene sine til prefix, banen der Homebrew er installert:
      <code>/opt/homebrew</code> på Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      på Linux/WSL og <code>/usr/local</code> på macOS Intel.'
    prefix: Homebrew installerer ikkje filer utanfor området sitt, og du kan plassere
      ein Homebrew-installasjon kor som helst.
    createpackages: Homebrew pakker er <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">formler
      og fat</a>.
    hack: Alt er Git og Ruby under overflata, så du kan hacke i veg – vel vitande
      om at du enkelt kan reversere endringane dine og flette inn oppdateringar frå
      andre.
    formula: 'Homebrew-formlar er enkle Ruby-skript:'
    editor: opnar i $EDITOR!
    complement: Homebrew er eit tillegg til macOS. Installer RubyGems sjølv med <code>gem</code>,
      og pakkane dei er avhengig av med <code>brew</code>.
    caskinstall: Endeleg slutt på “To install, drag this icon…”. <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>
      installerer macOS-appar, fontar og plugins og anna programvare som ikkje er
      open-kjeldekode.
    caskcreate: Å lage ein cask er like enkelt som å lage ein formel.
    install:
      install: "\U0001F680 Installer Homebrew"
      paste: Lim det inn i macOS-terminalen, et Linux-skall eller WSL.
      what: Skriptet forklarer hva det vil gjøre og stopper deretter før det gjør
        det. Les om andre <a href="https://docs.brew.sh/Installation">installasjonsalternativer</a>.
