    formulae_title: "\U0001F4E6 Homebrew-pakkar"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      er pakkedefinisjoner som bygger kommandolinjeverktøy, biblioteker og tjenester
      fra oppstrøms kildekode.
    formulae_help: Formulae i <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      krever menneskelig gjennomgang før de aksepteres, endres eller oppdateres og
      må være åpen kildekodeprogramvare med en <a href="https://wiki.debian.org/DFSGLicenses">Debian
      Free Software Guidelines</a>-kompatibel lisens (se kravene i <a href="https://docs.brew.sh/Acceptable-Formulae">Acceptable
      Formulae</a>). De vedlikeholdes av Homebrews vedlikeholdere og bidragsytere.
      Lag formulae med hjelp fra <a href="https://docs.brew.sh/Formula-Cookbook">Formula
      Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      er pakkedefinisjoner som installerer oppstrøms forhåndsbygde binærfiler som
      applikasjoner, fonter og plugins.
    casks_help: Noen casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      utenfor Homebrew, så bruk <code>brew upgrade --greedy</code> hvis du vil at
      Homebrew skal oppdatere dem også. Casks i <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      krever menneskelig vurdering før de aksepteres, endres eller oppdateres og må
      oppfylle kravene i <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Casks</a>. De vedlikeholdes av Homebrews vedlikeholdere og bidragsytere. Lag
      casks med hjelp fra <a href="https://docs.brew.sh/Cask-Cookbook">Cask Cookbook</a>.
    taps: Andre pakkelager kalles <a href="https://docs.brew.sh/Taps">taps</a>; de
      lar hvem som helst opprettholde sine egne formulae og casks utenfor de offisielt
      støttede arkivene. Les hvordan <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a> fungerer før du bruker ikke-offisielle taps, og lær deretter hvordan
      du <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">oppretter
      og vedlikeholder en tap</a>.
    bundle_title: "\U0001F4CB Homebrew Bundle-pakke"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      er deklarativ: den bruker en <code>Brewfile</code> for å beskrive tilstanden
      du ønsker. Kjør <code>brew bundle</code> for å installere manglende avhengigheter,
      oppdatere utdaterte og holde prosjekt- eller maskinoppsett repeterbart.'
    bundle_types: Homebrew Bundle støtter formler, fat, taps, Mac App Store-apper,
      WinGet-pakker på WSL, VSCode-utvidelser, Go-pakker, Cargo-pakker, uv-verktøy,
      Flatpak-pakker, krew kubectl-plugins og startbakgrunnstjenester med <code>bryggtjenester</code>.
