  subtitle: Менеджер пакетов для всех платформ
  pagecontent:
    search: Поиск
    language: Язык
    question: "\U0001F527 Что делает Homebrew?"
    what: Homebrew устанавливает <a href="https://formulae.brew.sh/formula/" title="Список
      пакетов Homebrew">консольные утилиты и приложения, которые вам
      нужны</a> на macOS, Linux и WSL.
    how: 'Homebrew не будет устанавливать файлы за пределами своего <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">префикса (prefix)</a>.
      Он устанавливает каждый пакет в свою собственную <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">кегу (keg)</a>
      внутри <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">целлара (Cellar, букв. перевод «подвал»)</a>,
      затем оставляет символические ссылки на свои файлы в prefix, путь, по которому установлен
      Homebrew: <code>/opt/homebrew</code> на Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      на Linux/WSL и <code>/usr/local</code> на macOS Intel.'
    createpackages: Пакеты Homebrew — это <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">«формулы» (formulae)
      и «каски» (casks)</a>.
    formulae_title: "\U0001F4E6 Пакеты Homebrew"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Формулы (formulae, букв. перевод «рецепты»)</a>
      — это определения пакетов, которые компилируют инструменты, библиотеки и утилиты для
      командной строки из исходного кода.
    formulae_help: Для формул в <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      требуется проверка человеком, прежде чем они будут приняты, отредактированы или обновлены,
      и должны быть программным обеспечением с открытым исходным кодом и лицензией,
      совместимой с <a href="https://wiki.debian.org/DFSGLicenses">Debian Free Software
      Guidelines</a> (см. требования в <a href="https://docs.brew.sh/Acceptable-Formulae">Acceptable
      Formulae</a>). Они поддерживаются мейнтейнерами и контрибьюторами Homebrew.
      В создании формул вам поможет <a href="https://docs.brew.sh/Formula-Cookbook">Formula Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Каски (casks, букв. перевод «бочки»)</a>
      — это определения пакетов, которые устанавливают предварительно созданные бинарные
      файлы, такие как приложения, шрифты и плагины.
    casks_help: Некоторые каски <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">обновляются сами</a>,
      а не при помощи Homebrew, поэтому используйте <code>brew upgrade --greedy</code>,
      если вы хотите, чтобы Homebrew также обновлял их. Для касков в <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      требуется проверка человеком, прежде чем они будут приняты, изменены или обновлены,
      и должны соответствовать требованиям (см. <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Casks</a>). Они поддерживаются мейнтейнерами и контрибьюторами Homebrew. В создании
      касков вам поможет <a href="https://docs.brew.sh/Cask-Cookbook">Cask Cookbook</a>.
    taps: Другие репозитории пакетов называются <a href="https://docs.brew.sh/Taps">тапами (taps, букв. перевод «краны»)</a>;
      они позволяют любому поддерживать свои собственные формулы и каски за пределами
      официально поддерживаемых репозиториев. Прежде чем использовать неофициальный
      репозиторий, прочтите, как работает <a href="https://docs.brew.sh/Tap-Trust">taptrust</a>.
      О создании и поддержке своего тапа см. статью
      <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">How to Create and Maintain a Tap</a>.
    bundle_title: "\U0001F4CB Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      предоставляет декларативный способ контроля зависимостей: он использует <code>Brewfile</code>
      для описания желаемого состояния. Используйте команду <code>brew bundle</code>, чтобы
      установить отсутствующие зависимости, обновить устаревшие и обеспечить воспроизводимую настройку окружения
      для проекта или нового компьютера.'
    bundle_types: Homebrew Bundle поддерживает формулы, каски, тапы, приложения из Mac
      App Store, пакеты WinGet на WSL, расширения VSCode, пакеты Go, пакеты Cargo,
      инструменты uv, пакеты Flatpak, плагины krew kubectl и запуск фоновых служб
      с помощью <code>brew services</code>.
    install:
      install: "\U0001F680 Установка Homebrew"
      paste: Вставьте это в терминал macOS, Linux или WSL.
      what: Перед выполнением скрипт покажет действия, которые он собирается совершить.
        Другие методы установки можно найти <a href="https://docs.brew.sh/Installation">здесь</a>.
      pkginstaller: Если вы используете macOS, попробуйте наш установщик <code>.pkg</code>
        для интерактивной или автоматической установки при помощи MDM.
      githubrelease: Загрузите его из последнего релиза на GitHub от <a href="https://github.com/Homebrew/brew/releases/latest">Homebrew</a>.
      supported: Homebrew <a href="https://docs.brew.sh/Support-Tiers">поддерживает</a> macOS (Sonoma 14 и новее), Linux и Windows Subsystem for Linux (WSL).
    doc:
      resources: "\U0001F4DA Ресурсы о Homebrew"
