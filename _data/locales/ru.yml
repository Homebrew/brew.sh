    formulae_title: "\U0001F4E6 Пакеты Homebrew"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      — это определения пакетов, которые создают инструменты, библиотеки и службы
      командной строки из исходного кода исходного кода.
    formulae_help: Formulae в <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      требуют проверки человеком, прежде чем они будут приняты, изменены или обновлены,
      и должны быть программным обеспечением с открытым исходным кодом и лицензией,
      совместимой с <a href="https://wiki.debian.org/DFSGLicenses">Debian Free Software
      Guidelines</a> (см. требования в <a href="https://docs.brew.sh/Acceptable-Formulae">Acceptable
      Formulae</a>). Они поддерживаются сопровождающими и участниками Homebrew. Создайте
      formulae с помощью <a href="https://docs.brew.sh/Formula-Cookbook">Formula Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      — это определения пакетов, которые устанавливают предварительно созданные двоичные
      файлы, такие как приложения, шрифты и плагины.
    casks_help: Некоторые casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      за пределами Homebrew, поэтому используйте <code>brew update --greedy</code>,
      если вы хотите, чтобы Homebrew также обновлял их. Casks в <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      требуют проверки человеком, прежде чем они будут приняты, изменены или обновлены,
      и должны соответствовать требованиям <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Caks</a>. Они поддерживаются сопровождающими и участниками Homebrew. Создайте
      casks с помощью кулинарной книги <a href="https://docs.brew.sh/Cask-Cookbook">Cask</a>.
    taps: Другие репозитории пакетов называются <a href="https://docs.brew.sh/Taps">taps</a>;
      они позволяют любому поддерживать свои собственные formulae и casks за пределами
      официально поддерживаемых репозиториев. Прежде чем использовать неофициальный
      taps, прочтите, как работает <a href="https://docs.brew.sh/Tap-Trust">taptrust</a>,
      а затем узнайте, как <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">создавать
      и поддерживать Tap</a>.
    bundle_title: "\U0001F4CB Пакет Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      является декларативным: он использует <code>Brewfile</code> для описания желаемого
      состояния. Запустите <code>brew Bundle</code>, чтобы установить отсутствующие
      зависимости, обновить устаревшие и обеспечить повторяемость настройки проекта
      или машины.'
    bundle_types: Homebrew Bundle поддерживает приложения formulae, casks, taps, Mac
      App Store, пакеты WinGet на WSL, расширения VSCode, пакеты Go, пакеты Cargo,
      инструменты uv, пакеты Flatpak, плагины krew kubectl и запуск фоновых служб
      с помощью <code>brew Services</code>.
