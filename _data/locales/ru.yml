      donate: "\U0001F4B8 Сделайте пожертвование в пользу Homebrew"
      donate_summary: Homebrew — это некоммерческий проект, полностью поддерживаемый
        волонтерами, а не наёмными сотрудниками. Нам нужны ваши средства для оплаты программного
        обеспечения, оборудования и хостинга для CI и будущих
        улучшений проекта. Каждое пожертвование будет потрачено на то, чтобы сделать
        Homebrew лучше для наших пользователей. Вы можете рассмотреть возможность делать
        регулярные пожертвования через <a href="https://github.com/sponsors/Homebrew">GitHub Sponsors</a>,
        <a href="https://opencollective.com/homebrew">Open Collective</a> или
        <a href="https://www.patreon.com/homebrew">Patreon</a>. Homebrew финансово размещается на
        <a href="https://opencollective.com/opensource">Open Source Collective</a>.
      blog: Блог Homebrew
      blog_summary: Прочтите <a href="/blog/">блог Homebrew</a>, чтобы ознакомиться
