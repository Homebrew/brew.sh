    question: "\U0001F527 Что делает Homebrew?"
    what: Homebrew устанавливает <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">инструменты и приложения командной строки, которые вам
      нужны </a> в macOS, Linux и WSL.
    how: 'Homebrew не будет устанавливать файлы за пределами своего <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">префикса</a>.
      Он устанавливает каждый пакет в свой собственный <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      внутри <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>,
      затем символически связывает свои файлы в prefix, путь, по которому установлен
      Homebrew: <code>/opt/homebrew</code> на Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      на Linux/WSL и <code>/usr/local</code> на macOS Intel.'
    prefix: Homebrew не устанавливает файлы за пределами своей директории. Вы можете
      установить Homebrew в любую директорию.
    createpackages: Пакеты Homebrew — это формулы <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">
      и контейнеры </a>.
    hack: Под капотом — <code>ruby</code> и <code>git</code>. Так что можно спокойно
      редактировать пакеты, а в случае чего сможете легко откатить свои изменения.
    formula: 'Спецификация пакета это просто скрипт на Ruby:'
