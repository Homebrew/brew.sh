    how: 'Homebrew לא יתקין קבצים מחוץ ל-<a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">קידומת</a>
      שלו. הוא מתקין כל חבילה לתוך <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      משלה בתוך <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>,
