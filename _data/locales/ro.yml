    formulae_title: "\U0001F4E6 Pachete Homebrew"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulele</a>
      sunt definiții de pachete care construiesc instrumente de linie de comandă,
      biblioteci și servicii din codul sursă din amonte.
    formulae_help: Formulae în <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      necesită revizuire umană înainte de a fi acceptate, modificate sau actualizate
      și trebuie să fie software open source cu o licență compatibilă cu <a href="https://wiki.debian.org/DFSGLicenses">Debian
      Free Software Guidelines</a> (consultați cerințele în <a href="https://docs.brew.sh/Acceptable-Formulae">Acceptable
      Formulae</a>). Ele sunt întreținute de menținătorii și contribuitorii lui Homebrew.
      Creați formulae cu ajutorul <a href="https://docs.brew.sh/Formula-Cookbook">Carte
      de bucate cu formule</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      sunt definiții de pachete care instalează binare pre-construite în amonte, cum
      ar fi aplicații, fonturi și pluginuri.
    casks_help: Unele casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      în afara Homebrew, așa că folosiți <code>brew upgrade --greedy</code> dacă doriți
      ca și Homebrew să le actualizeze. Casks din <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      necesită revizuire umană înainte de a fi acceptate, modificate sau actualizate
      și trebuie să îndeplinească cerințele din <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Casks</a>. Acestea sunt întreținute de menținătorii și colaboratorii lui Homebrew.
      Creați casks cu ajutorul <a href="https://docs.brew.sh/Cask-Cookbook">Cask Cookbook</a>.
    taps: Alte depozite de pachete se numesc <a href="https://docs.brew.sh/Taps">taps</a>;
      permit oricui să-și mențină propriile formulae și casks în afara depozitelor
      acceptate oficial. Citiți cum funcționează <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a> înainte de a utiliza taps neoficial, apoi aflați cum să <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">creați
      și mențineți un tap</a>.
    bundle_title: "\U0001F4CB Pachet Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      este declarativ: folosește un <code>Brewfile</code> pentru a descrie starea
      pe care o doriți. Rulați <code>brew bundle</code> pentru a instala dependențele
      lipsă, actualizați-le pe cele învechite și păstrați repetabilă configurarea
      proiectului sau a mașinii.'
    bundle_types: Homebrew Bundle acceptă aplicațiile formulae, casks, taps, Mac App
      Store, pachete WinGet pe extensiile WSL, VSCode, pachete Go, pachete Cargo,
      pachete Cargo, pachete WinGet, pachete WSL, VSCode krew kubectl pluginuri și
      pornirea serviciilor de fundal cu <code>brew services</code>.
