  pagecontent:
    search: Caută
    language: Limba
    question: "\U0001F527 Ce face Homebrew?"
    what: Homebrew instalează <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">instrumentele și aplicațiile de linie de comandă de care
      aveți nevoie</a> în macOS, Linux și WSL.
    how: 'Homebrew nu va instala fișiere în afara <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefixului</a>.
      Instalează fiecare pachet în propriul său <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      în interiorul <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>,
      apoi face linkuri simbolice ale fișierelor în prefix, calea în care este instalat
      Homebrew: <code>/opt/homebrew</code> pe </code>, <code>/home/linuxbrew/.linuxbrew</code>
      pe Linux/WSL și <code>/usr/local</code> pe macOS Intel.'
    prefix: Homebrew nu va instala fișiere în afara directorului său, așa că poți
      instala Homebrew oriunde dorești.
    createpackages: Pachetele Homebrew sunt <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">formule
      și butoaie</a>.
    hack: Totul este Git și Ruby la bază, deci poți anula cu ușurință modificările
      și le poți aduce înapoi pe cele originale.
    formula: 'Formulele Homebrew sunt doar script-uri în Ruby:'
    editor: se deschide în $EDITOR!
    complement: Homebrew întregește macOS (sau sistemul tău Linux). Instalează pachetele
      RubyGems cu <code>gem</code> și dependențele sale cu <code>brew</code>.
    caskinstall: Gata cu „Pentru a instala, trage acest icon…”. <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>
      instalează aplicații macOS, fonturi și module și alte softuri non-open source.
    caskcreate: Crearea unui cask este la fel de simplă ca și crearea unei formule.
    install:
      install: "\U0001F680 Instalați Homebrew"
      paste: Lipiți-l în terminalul macOS, un shell Linux sau WSL.
      what: Scriptul explică ce va face și apoi se întrerupe înainte de a o face.
        Citiți despre alte <a href="https://docs.brew.sh/Installation">opțiuni de
        instalare</a>.
      pkginstaller: Dacă sunteți pe macOS, încercați programul nostru de instalare
        <code>.pkg</code> pentru instalări MDM interactive sau nesupravegheate.
      githubrelease: Descărcați-l din cea mai recentă versiune GitHub a <a href="https://github.com/Homebrew/brew/releases/latest">Homebrew</a>.
      supported: Homebrew <a href="https://docs.brew.sh/Support-Tiers">suportă</a>
        macOS (Sonoma 14 și mai noi), Linux și Windows Subsystem for Linux (WSL).
