    question: "\U0001F527 Што робіць Homebrew?"
    what: Homebrew усталёўвае <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">інструменты каманднага радка і прыкладанні, неабходныя</a>
      для macOS, Linux і WSL.
    how: 'Homebrew не будзе ўсталёўваць файлы па-за сваім <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">прэфіксам</a>.
      Ён усталёўвае кожны пакет у яго ўласны <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      унутры <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>,
      затым сімвалізуе свае файлы ў prefix, шлях, дзе ўсталяваны Homebrew: <code>/opt/homebrew</code>
      на Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code> на Linux/WSL і <code>/usr/local</code>
      на macOS Intel.'
    prefix: Homebrew не ўсталёўвае файлы за межамі сваёй дырэкторыі, якую пры гэтым
