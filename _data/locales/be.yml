    casks_help: Некаторыя casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">аўтаматычнае
      абнаўленне</a> па-за межамі Homebrew, таму выкарыстоўвайце <code>brew upgrade
      --greedy</code>, калі хочаце, каб Homebrew таксама абнаўляў іх. Casks у <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      патрабуе праверкі чалавекам, перш чым яны будуць прыняты, зменены або абноўлены,
      і яны павінны адпавядаць патрабаванням у <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
