      афіцыйна падтрымоўваных сховішчаў. Прачытайце, як працуе <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a>, перш чым выкарыстоўваць неафіцыйны taps, затым даведайцеся, як <a
      href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">стварыць і падтрымліваць
      кран</a>.
