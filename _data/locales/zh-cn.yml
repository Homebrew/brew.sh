    formulae_title: "\U0001F4E6 Homebrew 软件包"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      是从上游源代码构建命令行工具、库和服务的包定义。
    formulae_help: <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      中的 Formulae 在被接受、更改或更新之前需要人工审核，并且必须是具有 <a href="https://wiki.debian.org/DFSGLicenses">Debian
      自由软件指南</a> 兼容许可证的开源软件（请参阅 <a href="https://docs.brew.sh/Acceptable-Formulae">
      可接受的公式 </a> 中的要求）。它们由 Homebrew 的维护者和贡献者维护。在 <a href="https://docs.brew.sh/Formula-Cookbook">Formula
      Cookbook</a> 的帮助下创建 formulae。
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      是安装上游预构建二进制文件（例如应用程序、字体和插件）的包定义。
    casks_help: Homebrew 之外的一些 casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      ，因此如果您希望 Homebrew 也更新它们，请使用 <code>brew update --greedy</code> 。 <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      中的 Casks 在接受、更改或更新之前需要人工审核，并且必须满足 <a href="https://docs.brew.sh/Acceptable-Casks">
      可接受的木桶 </a> 中的要求。它们由 Homebrew 的维护者和贡献者维护。在 <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      Cookbook</a> 的帮助下创建 casks。
    taps: 其他包存储库称为 <a href="https://docs.brew.sh/Taps">taps</a>；他们允许任何人在官方支持的存储库之外维护自己的
      formulae 和 casks 。在使用非官方 taps 之前，请先阅读 <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a> 的工作原理，然后了解如何 <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">
      创建和维护 Tap</a>。
    bundle_title: "\U0001F4CB Homebrew Bundle 软件包"
    bundle: <a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      是声明性的：它使用 <code>Brewfile</code> 来描述您想要的状态。运行 <code>brew bundle</code> 来安装缺少的依赖项、更新过时的依赖项并保持项目或机器设置可重复。
    bundle_types: Homebrew Bundle 支持 formulae、casks、taps、Mac App Store 应用程序、WSL、VSCode
      扩展上的 WinGet 软件包、Go 软件包、Cargo 软件包、uv 工具、Flatpak 软件包、krew kubectl 插件以及使用 <code>brew
      services</code> 启动后台服务。
