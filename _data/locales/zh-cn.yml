    question: "\U0001F527 Homebrew 做什么？"
    what: Homebrew 安装 <a href="https://formulae.brew.sh/formula/" title="List of Homebrew
      packages"> 您需要的 </a> 跨 macOS、Linux 和 WSL 的命令行工具和应用程序。
    how: Homebrew 不会安装其 <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefix</a>
      之外的文件。它将每个软件包安装到 <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>
      内自己的 <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      中，然后将其文件符号链接到 prefix，即安装 Homebrew 的路径：<code>/opt/homebrew</code> 在 Apple Silicon
      上，<code>/home/linuxbrew/.linuxbrew</code> 在 Linux/WSL 上以及 macOS Intel 上的 <code>/usr/local</code>。
    prefix: Homebrew 不会将文件安装到它本身目录之外，所以您可将 Homebrew 安装到任意位置。
    createpackages: Homebrew 包装为 <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">
      配方和桶 </a>。
    hack: 完全基于 Git 和 Ruby，所以自由修改的同时你仍可以轻松撤销你的变更或与上游更新合并。
    formula: Homebrew 的配方都是简单的 Ruby 脚本：
    editor: 使用 $EDITOR 编辑!
    complement: Homebrew 使 macOS（或您的 Linux 系统）更完整。使用 <code>gem</code> 来安装 RubyGems、用
      <code>brew</code> 来安装那些依赖包。
