      pkginstaller: Si sou a macOS, proveu el nostre instal·lador <code>.pkg</code>
        per a instal·lacions interactives o desateses de MDM.
      githubrelease: Baixeu-lo des de l'<a href="https://github.com/Homebrew/brew/releases/latest">última versió de Homebrew a GitHub</a>.
      supported: Homebrew <a href="https://docs.brew.sh/Support-Tiers">admet</a> macOS
        (Sonoma 14 i posteriors), Linux i Windows Subsystem for Linux (WSL).
