      donate_summary: Homebrew és un projecte sense ànim de lucre gestionat íntegrament
        per voluntaris, no per empleats. Necessitem els vostres fons per pagar el
        programari, el maquinari i l'allotjament al voltant de la integració contínua
        i les millores futures del projecte. Cada donació es destinarà a millorar
        Homebrew per als nostres usuaris. Penseu en una donació regular a través de
        <a href="https://github.com/sponsors/Homebrew">Patrocinadors de GitHub</a>,
        <a href="https://opencollective.com/homebrew">Open Collective</a> o <a href="https://www.patreon.com/homebrew">Patreon</a>.
        Homebrew està allotjat fiscalment pel <a href="https://opencollective.com/opensource">Open
