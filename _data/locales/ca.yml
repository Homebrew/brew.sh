    question: "\U0001F527 Què fa Homebrew?"
    what: Homebrew instal·la <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">les eines i aplicacions de línia d'ordres que necessiteu</a>
      a macOS, Linux i WSL.
    how: 'Homebrew no instal·larà fitxers fora del seu <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefix</a>.
      Instal·la cada paquet al seu propi <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      dins del <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>,
      després enllaça simbòlicament els seus fitxers al prefix, el camí on s''instal·la
      Homebrew: <code>/opt/homebrew</code> a Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      a Linux/WSL i <code>/usr/local</code> a macOS Intel.'
    prefix: Homebrew no instal·larà arxius fora del seu prefix, i pots instal·lar
      Homebrew allà on vulguis.
    createpackages: Els paquets Homebrew són <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">fórmules
      i bótes</a>.
    hack: Per sota és tot Git i Ruby, de manera que pots fer canvis sabent que podràs
      fer i desfer les teves modificacions i obtenir actualitzacions sense problemes.
    formula: 'Les fórmules de Homebrew són senzills <i>scripts</i> Ruby:'
    editor: opens in $EDITOR!
    complement: Homebrew complementa macOS. Instal·la les teves <i>RubyGems</i> amb
      <code>gem</code>, i les seves dependències amb <code>brew</code>.
    caskinstall: “To install, drag this icon…” no more. <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>
      installs macOS apps, fonts and plugins and other non-open source software.
    caskcreate: Making a cask is as simple as creating a formula.
    install:
      install: "\U0001F680 Instal·la Homebrew"
      paste: Enganxeu-ho al terminal macOS, un shell Linux o WSL.
