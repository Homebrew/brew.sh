    formulae_title: "\U0001F4E6 Paquets de Homebrew"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Fórmules</a>
      són definicions de paquets que creen eines de línia d'ordres, biblioteques i
      serveis a partir del codi font.
    formulae_help: Formulae a <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      requereixen una revisió humana abans de ser acceptats, canviats o actualitzats
      i han de ser programari de codi obert amb una llicència compatible amb <a href="https://wiki.debian.org/DFSGLicenses">Directrius
      de programari lliure Debian</a> (consulteu els requisits a <a href="https://docs.brew.sh/Acceptable-Formulae">Fórmules
      acceptables</a>). Els mantenen els responsables i els col·laboradors de Homebrew.
      Creeu formulae amb l'ajuda del <a href="https://docs.brew.sh/Formula-Cookbook">Formula
      Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      són definicions de paquets que instal·len binaris preconstruïts, com ara aplicacions,
      tipus de lletra i connectors.
    casks_help: Alguns casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">actualització
      automàtica</a> fora de Homebrew, així que utilitzeu <code>brew upgrade --greedy</code>
      si voleu que Homebrew també els actualitzi. Casks a <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      requereixen una revisió humana abans d'acceptar-los, canviar-los o actualitzar-los
      i han de complir els requisits de <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Casks</a>. Els mantenen els responsables i els col·laboradors de Homebrew. Creeu
      casks amb l'ajuda del <a href="https://docs.brew.sh/Cask-Cookbook">Cask Cookbook</a>.
    taps: Altres repositoris de paquets s'anomenen <a href="https://docs.brew.sh/Taps">taps</a>;
      permeten que qualsevol persona mantingui els seus propis formulae i casks fora
      dels repositoris amb suport oficial. Llegiu com funciona <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a> abans d'utilitzar taps no oficial i, a continuació, apreneu a <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">crear
      i mantenir un tap</a>.
    bundle_title: "\U0001F4CB Paquet Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      és declaratiu: utilitza un <code>Brewfile</code> per descriure l''estat que
      voleu. Executeu <code>brew bundle</code> per instal·lar les dependències que
      falten, actualitzar-ne les obsoletes i mantenir la configuració del projecte
      o de la màquina repetible.'
    bundle_types: Homebrew Bundle admet formulae, casks, taps, aplicacions de la Mac App Store, paquets WinGet a WSL, extensions de VSCode, paquets Go, paquets Cargo, eines uv, paquets Flatpak, connectors krew kubectl i l'inici de serveis en segon pla amb <code>brew services</code>.
