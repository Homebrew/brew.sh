      içine yükler, ardından dosyalarını Homebrew''nin kurulu olduğu yol olan prefix''ye
      sembolik bağlar: Apple Silicon üzerinde <code>/opt/homebrew</code>, <code>/home/linuxbrew/.linuxbrew</code>,
      Linux/WSL üzerinde ve <code>/usr/local</code>, macOS Intel üzerinde.'
