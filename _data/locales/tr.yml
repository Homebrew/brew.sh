      bakımcıları ve katkıda bulunanları tarafından korunur. <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      Yemek Kitabı</a> yardımıyla casks oluşturun.
    taps: Diğer paket depolarına <a href="https://docs.brew.sh/Taps">taps</a> adı
