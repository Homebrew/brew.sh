    formulae_title: "\U0001F4E6 Homebrew पैकेज"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      पैकेज परिभाषाएँ हैं जो अपस्ट्रीम स्रोत कोड से कमांड-लाइन टूल, लाइब्रेरी और सेवाओं
      का निर्माण करती हैं।
    formulae_help: <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      में Formulae को स्वीकार करने, बदलने या अद्यतन करने से पहले मानव समीक्षा की आवश्यकता
      होती है और <a href="https://wiki.debian.org/DFSGLicenses">डेबियन फ्री सॉफ्टवेयर
      दिशानिर्देश</a>-संगत लाइसेंस के साथ खुला स्रोत सॉफ़्टवेयर होना चाहिए (<a href="https://docs.brew.sh/Acceptable-Formulae">स्वीकार्य
      फॉर्मूला</a> में आवश्यकताओं को देखें)। इनका रखरखाव Homebrew के अनुरक्षकों और
      योगदानकर्ताओं द्वारा किया जाता है। <a href="https://docs.brew.sh/Formula-Cookbook">फ़ॉर्मूला
      कुकबुक</a> की सहायता से formulae बनाएं।
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      पैकेज परिभाषाएँ हैं जो अपस्ट्रीम पूर्व-निर्मित बायनेरिज़ जैसे एप्लिकेशन, फ़ॉन्ट
      और प्लगइन्स स्थापित करती हैं।
    casks_help: कुछ casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      Homebrew के बाहर, इसलिए यदि आप चाहते हैं कि Homebrew उन्हें भी अपडेट करें तो
      <code>brew अपग्रेड --greedy</code> का उपयोग करें। <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      में Casks को स्वीकार करने, बदलने या अद्यतन करने से पहले मानव समीक्षा की आवश्यकता
      होती है और <a href="https://docs.brew.sh/Acceptable-Casks">स्वीकार्य पीपों</a>
      में आवश्यकताओं को पूरा करना होगा। इनका रखरखाव Homebrew के अनुरक्षकों और योगदानकर्ताओं
      द्वारा किया जाता है। <a href="https://docs.brew.sh/Cask-Cookbook">Cask Cookbook</a>
      की सहायता से casks बनाएं।
    taps: अन्य पैकेज रिपॉजिटरी को <a href="https://docs.brew.sh/Taps">taps</a> कहा
      जाता है; वे किसी को भी आधिकारिक तौर पर समर्थित रिपॉजिटरी के बाहर अपना formulae
      और casks बनाए रखने देते हैं। गैर-आधिकारिक taps का उपयोग करने से पहले पढ़ें कि
      <a href="https://docs.brew.sh/Tap-Trust">tap Trust</a> कैसे काम करता है, फिर
      सीखें कि <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">tap</a>
      कैसे बनाएं और बनाए रखें।
    bundle_title: "\U0001F4CB Homebrew Bundle पैकेज"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew बंडल</a>
      घोषणात्मक है: यह आपके इच्छित राज्य का वर्णन करने के लिए <code>Brewfile</code>
      का उपयोग करता है। गायब निर्भरताएँ स्थापित करने, पुरानी निर्भरताएँ अपडेट करने
      और प्रोजेक्ट या मशीन सेटअप को दोहराने योग्य बनाए रखने के लिए <code>brew बंडल</code>
      चलाएँ।'
    bundle_types: Homebrew Bundle formulae, casks, taps, Mac App Store ऐप्स, WSL पर
      WinGet पैकेज, VSCode एक्सटेंशन, Go पैकेज, Cargo पैकेज, uv टूल, Flatpak पैकेज,
      krew kubectl प्लगइन्स और को सपोर्ट करता है। <code>brew Services</code> के साथ
      पृष्ठभूमि सेवाएँ प्रारंभ करना।
