    question: "\U0001F527 Homebrew क्या करता है?"
    what: Homebrew आपके लिए आवश्यक <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages"> कमांड-लाइन टूल और एप्लिकेशन</a> को macOS, Linux और WSL
      पर इंस्टॉल करता है।
    how: 'Homebrew अपने <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefix</a>
      के बाहर फ़ाइलें स्थापित नहीं करेगा। यह प्रत्येक पैकेज को <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>
      के अंदर अपने <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      में स्थापित करता है, फिर अपनी फ़ाइलों को prefix में सिमलिंक करता है, वह पथ जहां
      Homebrew स्थापित है: <code>/opt/homebrew</code> Apple Silicon पर, <code>/home/linuxbrew/.linuxbrew</code>
      Linux/WSL पर और <code>/usr/local</code> macOS Intel पर।'
    prefix: Homebrew अपने उपसर्ग के बाहर फाइलें स्थापित नहीं करता है और आप अपनी इच्छानुसार
