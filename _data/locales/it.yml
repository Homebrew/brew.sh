    formulae_title: "\U0001F4E6 Pacchetti Homebrew"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      sono definizioni di pacchetto che creano strumenti, librerie e servizi da riga
      di comando dal codice sorgente upstream.
    formulae_help: Formulae in <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      richiedono la revisione umana prima di essere accettati, modificati o aggiornati
      e devono essere software open source con una licenza compatibile con <a href="https://wiki.debian.org/DFSGLicenses">Linee
      guida per il software libero Debian</a> (vedere i requisiti in <a href="https://docs.brew.sh/Acceptable-Formulae">Formule
      accettabili</a>). Sono gestiti dai manutentori e dai contributori di Homebrew.
      Crea formulae con l'aiuto del <a href="https://docs.brew.sh/Formula-Cookbook">Formula
      Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      sono definizioni di pacchetto che installano file binari precostruiti upstream
      come applicazioni, caratteri e plugin.
    casks_help: Alcuni casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      all'esterno di Homebrew, quindi usa <code>brew upgrade --greedy</code> se vuoi
      che Homebrew aggiorni anche loro. Gli Casks in <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      richiedono la revisione umana prima di essere accettati, modificati o aggiornati
      e devono soddisfare i requisiti in <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Casks</a>. Sono gestiti dai manutentori e dai contributori di Homebrew. Crea
      casks con l'aiuto di <a href="https://docs.brew.sh/Cask-Cookbook">Cask Cookbook</a>.
    taps: Altri repository di pacchetti sono chiamati <a href="https://docs.brew.sh/Taps">taps</a>;
      consentono a chiunque di mantenere i propri formulae e casks al di fuori dei
      repository ufficialmente supportati. Leggi come funziona <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a> prima di utilizzare taps non ufficiale, quindi scopri come <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">creare
      e gestire un tap</a>.
    bundle_title: "\U0001F4CB Pacchetto Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      è dichiarativo: utilizza un <code>Brewfile</code> per descrivere lo stato desiderato.
      Esegui <code>brew bundle</code> per installare le dipendenze mancanti, aggiornare
      quelle obsolete e mantenere ripetibile la configurazione del progetto o della
      macchina.'
    bundle_types: Homebrew Bundle supporta formulae, casks, taps, app Mac App Store,
      pacchetti WinGet su WSL, estensioni VSCode, pacchetti Go, pacchetti Cargo, strumenti
      uv, pacchetti Flatpak, pacchetti krew kubectl plugin e avvio di servizi in background
      con <code>brew services</code>.
