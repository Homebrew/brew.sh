  subtitle: Il gestore dei pacchetti ovunque
  pagecontent:
    search: Cerca
    language: Lingua
    question: "\U0001F527 Cosa fa Homebrew?"
    what: Homebrew installa <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">gli strumenti da riga di comando e le applicazioni di
      cui hai bisogno</a> su macOS, Linux e WSL.
    how: 'Homebrew non installerà file al di fuori del suo <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefix</a>.
      Installa ciascun pacchetto nel proprio <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      all''interno di <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>,
      quindi collega simbolicamente i file a prefix, il percorso in cui è installato
      Homebrew: <code>/opt/homebrew</code> su Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      su Linux/WSL e <code>/usr/local</code> su macOS Intel.'
    prefix: Homebrew non installerà file all’infuori del suo percorso e puoi installare
      Homebrew ovunque tu voglia.
    createpackages: I pacchetti Homebrew sono <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">formule
      e botti</a>.
    hack: Si basa tutto su Git e Ruby, quindi sentiti libero di sperimentare col codice,
      sapendo che potrai facilmente fare il revert delle tue modifiche ed il merge
      con gli aggiornamenti upstream.
    formula: 'Le formule di Homebrew sono semplici script in Ruby:'
    editor: si apre in $EDITOR!
    complement: Homebrew completa macOS (o il tuo sistema Linux). Installa le tue
      RubyGems con <code>gem</code> e le loro dipendenze con <code>brew</code>.
    caskinstall: Mai più “Per installarlo, trascina questa icona…”. <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>
      installa app per macOS, font e plugin ed altri software non-open source.
    caskcreate: Creare una cask è semplice come creare una formula.
    install:
      install: "\U0001F680 Installa Homebrew"
      paste: Incollalo nel terminale macOS, in una shell Linux o WSL.
      what: Lo script spiega cosa farà e poi fa una pausa prima di farlo. Leggi informazioni
        sulle altre <a href="https://docs.brew.sh/Installation">opzioni di installazione</a>.
      pkginstaller: Se utilizzi macOS, prova il nostro programma di installazione
        <code>.pkg</code> per installazioni MDM interattive o automatiche.
      githubrelease: Scaricalo dall'ultima GitHub versione di <a href="https://github.com/Homebrew/brew/releases/latest">Homebrew</a>.
      supported: Homebrew <a href="https://docs.brew.sh/Support-Tiers">supporta</a>
        macOS (Sonoma 14 e versioni successive), Linux e Windows Subsystem for Linux
        (WSL).
