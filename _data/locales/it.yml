      donate_summary: Homebrew è un progetto no-profit gestito interamente da volontari,
        non da dipendenti. Abbiamo bisogno dei tuoi fondi per pagare software, hardware
        e hosting per l'integrazione continua e i futuri miglioramenti al progetto.
        Ogni donazione verrà spesa per migliorare Homebrew per i nostri utenti. Considera
