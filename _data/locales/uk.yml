  subtitle: Менеджер пакетів для усіх платформ
  pagecontent:
    search: Пошук
    language: Мова
    question: "\U0001F527 Що робить Homebrew?"
    what: Homebrew інсталює <a href="https://formulae.brew.sh/formula/" title="Список пакетів Homebrew">консольні утиліти і додатки, які вам знадобляться</a> на
      macOS, Linux та WSL.
    how: 'Homebrew не буде інсталювати файли поза межами свого <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">«префікса» (prefix)</a>.
      Він інсталює кожен пакет в свою власну <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">«кегу» (keg)</a>
      всередині <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">«целлара» (Cellar, букв. переклад «підвал»)</a>,
      потім залишає символьне посилання на свої файли в prefix, шлях, за яким інстальован Homebrew:
      <code>/opt/homebrew</code> на Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      на Linux/WSL і <code>/usr/local</code> на macOS Intel.'
    createpackages: Пакети Homebrew — це <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">«формули» (formulae)
      та «каски» (casks)</a>.
    formulae_title: "\U0001F4E6 Пакети Homebrew"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">«Формули» (formulae, букв. переклад «рецепт»)</a>
      це визначення пакетів, які компілюють інструменти, бібліотеки та утиліти для командного рядка з початкового коду.
    formulae_help: Формули в <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      потребують перевірки людиною перш ніж вони будуть прийняті, відредаговані або оновлені і повинні
      бути програмним забезпеченням з відкритим початковим кодом та ліцензією, що сумісна з
      <a href="https://wiki.debian.org/DFSGLicenses">Debian Free Software Guidelines</a> (див. вимоги в <a
      href="https://docs.brew.sh/Acceptable-Formulae">Acceptable Formulae</a>). Вони підтримуються мейнтейнерами
      та контрибьюторами Homebrew. У створені формул вам допоможе <a href="https://docs.brew.sh/Formula-Cookbook">Formula Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">«Каски» (casks, букв. переклад «бочки»)</a>
      це визначення пакетів, які інсталюють попередню створені бінарні файли, такі як додатки, шріфти та плагіни.
    casks_help: Деякі каски <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">оновлюються самостійно</a>,
      без допомоги Homebrew, тому використовуйте <code>brew upgrade --greedy</code> якщо ви бажаєте, щоб Homebrew
      також оновлював їх. Каскам в <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      потрібна перевірка людиною перш ніж вони будуть прийняті, відредаговані або оновлені і повинні відповідати вимогам
      (див. <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Casks</a>). Вони підтримуються мейнтейнерами та контрибьюторами Homebrew. У створенні бочек
      вам допоможе <a href="https://docs.brew.sh/Cask-Cookbook">Cask Cookbook</a>.
    taps: Інші репозиторії пакетів звуться <a href="https://docs.brew.sh/Taps">«тапами» (taps, букв. переклад «крани»)</a>;
      вони дозволяють будь-якому підтримувати свої власні формули та каски поза межами офіційно підтримуваних
      репозиторіїв. Перш ніж використовувати неофіційний репозиторій, прочитайте, як працює
      <a href="https://docs.brew.sh/Tap-Trust">taptrust</a>. О створенні та підтримці
      свого тапа див. статтю <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">How to Create and Maintain a Tap</a>.
    bundle_title: "\U0001F4CB Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      надає декларативний засіб контролю залежностей: він використовує <code>Brewfile</code> для опису бажаного стану.
      Використовуйте команду <code>brew bundle</code>, щоб інсталювати відсутні залежності, оновити застарілі та забезпечити
      налаштування середовища проекту або нового комп’ютера.'
    bundle_types: Homebrew Bundle підтримує формули, каски, тапи, додатки з Mac App Store,
      пакети WinGet на WSL, розширення VSCode, пакети Go, пакети Cargo, інструменти uv,
      пакети Flatpak, плагіни krew kubectl та запуск фонових служб за допомогою
      <code>brew services</code>.
    install:
      install: "\U0001F680 Інсталювання Homebrew"
      paste: Вставте це в термінал macOS, Linux або WSL.
      what: Перед використанням скрипт пояснить дії, які він збирається зробити.
        Інші методи інсталювання можна знайти <a href="https://docs.brew.sh/Installation">тут</a>.
      pkginstaller: Якщо ви використовуєте macOS, спробуйте наш інсталятор <code>.pkg</code> для інтерактивної або автоматичної істаляції за допомогою MDM.
      githubrelease: Завантажте його з останнього релізу на GitHub від <a href="https://github.com/Homebrew/brew/releases/latest">Homebrew</a>.
      supported: Homebrew <a href="https://docs.brew.sh/Support-Tiers">підтримує</a>
        macOS (Sonoma 14 або новіші), Linux та Windows Subsystem for Linux (WSL).
