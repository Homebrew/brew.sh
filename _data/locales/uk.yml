    question: "\U0001F527 Що робить Homebrew?"
    what: Homebrew встановлює <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">інструменти командного рядка та програми, які вам потрібні</a>
      в macOS, Linux та WSL.
    how: 'Homebrew не встановлюватиме файли за межами свого <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">префікса</a>.
      Він встановлює кожен пакет у власний <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      всередині <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>,
      а потім символічно посилає свої файли на prefix, шлях, де встановлено Homebrew:
      <code>/opt/homebrew</code> на Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      на Linux/WSL та <code>/usr/local</code> на macOS Intel.'
    prefix: Homebrew не встановлює файли поза своїм префіксом, і ви можете розмістити
      інсталяцію Homebrew де завгодно.
