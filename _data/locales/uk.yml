      donate: "\U0001F4B8 Зробіть пожертвування Homebrew"
      donate_summary: Homebrew це некомерційний проект, який повністю підтримується волонтерами, а не найманими співробітниками.
        Нам потрібні кошти щоб платити за програмне та апаратне забезпечення та хостингу CI та майбутніх покращень проекту.
        Кожне пожертвування буде використано на то, щоб зробити Homebrew краще для наших користувачів. Ви можете розглянути
        можливість робити регулярні пожертвування через <a href="https://github.com/sponsors/Homebrew">GitHub Sponsors</a>,
        <a href="https://opencollective.com/homebrew">Open Collective</a> або
