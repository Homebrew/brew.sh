    formulae_title: "\U0001F4E6 Пакунки Homebrew"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      — це визначення пакетів, які створюють інструменти командного рядка, бібліотеки
      та служби з попереднього вихідного коду.
    formulae_help: Formulae у <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      вимагають перевірки людиною, перш ніж їх прийняти, змінити або оновити, і мають
      бути програмним забезпеченням з відкритим кодом із сумісною ліцензією <a href="https://wiki.debian.org/DFSGLicenses">Debian
      Free Software Guidelines</a> (див. вимоги в <a href="https://docs.brew.sh/Acceptable-Formulae">Прийнятні
      формули</a>). Вони підтримуються супроводжуючими та співавторами Homebrew. Створіть
      formulae за допомогою <a href="https://docs.brew.sh/Formula-Cookbook">Formula
      Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      — це визначення пакетів, які встановлюють попередньо зібрані двійкові файли,
      такі як програми, шрифти та плагіни.
    casks_help: Деякі casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">автооновлення</a>
      поза Homebrew, тому використовуйте <code>brew upgrade --greedy</code>, якщо
      ви хочете, щоб Homebrew оновив їх також. Casks у <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      вимагають перевірки людиною, перш ніж їх прийняти, змінити чи оновити, і мають
      відповідати вимогам у <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Casks</a>. Вони обслуговуються супроводжуючими та учасниками Homebrew. Створіть
      casks за допомогою <a href="https://docs.brew.sh/Cask-Cookbook">Cask Cookbook</a>.
    taps: Інші репозиторії пакетів називаються <a href="https://docs.brew.sh/Taps">taps</a>;
      вони дозволяють будь-кому підтримувати власні formulae та casks за межами офіційно
      підтримуваних репозиторіїв. Прочитайте, як працює <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a>, перш ніж використовувати неофіційний taps, потім дізнайтеся, як <a
      href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">створити та підтримувати
      tap</a>.
    bundle_title: "\U0001F4CB Пакунок Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      є декларативним: він використовує <code>Brewfile</code> для опису потрібного
      стану. Запустіть <code>brew bundle</code>, щоб установити відсутні залежності,
      оновити застарілі та зберегти повторюваність налаштувань проекту чи машини.'
    bundle_types: Homebrew Bundle підтримує програми formulae, casks, taps, Mac App
