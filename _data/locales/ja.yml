    formulae_title: "\U0001F4E6 Homebrew パッケージ"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      は、上流のソース コードからコマンド ライン ツール、ライブラリ、およびサービスを構築するパッケージ定義です。
    formulae_help: <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      の Formulae は、承認、変更、または更新する前に人間によるレビューが必要であり、<a href="https://wiki.debian.org/DFSGLicenses">Debian
      フリー ソフトウェア ガイドライン</a> と互換性のあるライセンスを持つオープン ソース ソフトウェアである必要があります (<a href="https://docs.brew.sh/Acceptable-Formulae">Acceptable
      Formulae</a> の要件を参照)。これらは Homebrew のメンテナとコントリビュータによって保守されています。 <a href="https://docs.brew.sh/Formula-Cookbook">Formula
      Cookbook</a> を利用して formulae を作成します。
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      は、アプリケーション、フォント、プラグインなどのアップストリームのビルド済みバイナリをインストールするパッケージ定義です。
    casks_help: 一部の casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      は Homebrew の外にあるため、Homebrew にも更新したい場合は <code>brew upgrade --greedy</code> を使用します。
      <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a> の Casks
      は、受け入れ、変更、または更新する前に人間によるレビューを必要とし、<a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Casks</a> の要件を満たしている必要があります。これらは Homebrew のメンテナとコントリビュータによって保守されています。 <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      Cookbook</a> を利用して casks を作成します。
    taps: 他のパッケージ リポジトリは <a href="https://docs.brew.sh/Taps">taps</a> と呼ばれます。公式にサポートされているリポジトリの外で、誰でも独自の
      formulae および casks を保守できるようになります。非公式 taps を使用する前に、<a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a> がどのように機能するかを読んでから、<a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">tap</a>
      を作成および維持する方法を学びます。
    bundle_title: "\U0001F4CB Homebrew Bundle パッケージ"
    bundle: <a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      は宣言型です。<code>Brewfile</code> を使用して、必要な状態を記述します。 <code>brew Bundle</code> を実行して、不足している依存関係をインストールし、古い依存関係を更新して、プロジェクトまたはマシンのセットアップを繰り返し可能な状態に保ちます。
    bundle_types: Homebrew Bundle は、formulae、casks、taps、Mac App Store アプリ、WSL の WinGet
      パッケージ、VSCode 拡張機能、Go パッケージ、Cargo パッケージ、uv ツール、Flatpak パッケージ、krew kubectl プラグイン、および
      <code>brew services</code> によるバックグラウンド サービスの開始をサポートします。
