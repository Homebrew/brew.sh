  pagecontent:
    search: 検索
    language: 言語
    question: "\U0001F527 Homebrew は何をしますか?"
    what: Homebrew は、<a href="https://formulae.brew.sh/formula/" title="List of Homebrew
      packages"> に必要なコマンドライン ツールとアプリケーションをインストールします</a> は、macOS、Linux、WSL にわたってインストールされます。
    how: 'Homebrew は、<a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefix</a>
      の外にファイルをインストールしません。各パッケージを <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>
      内の独自の <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      にインストールし、そのファイルを Homebrew がインストールされているパスである prefix にシンボリックリンクします: Apple Silicon
      では <code>/opt/homebrew</code>、Apple Silicon では <code>/home/linuxbrew/.linuxbrew</code>
      Linux/WSL および <code>/usr/local</code> (macOS Intel)。'
    prefix: Homebrewはプレフィックスの外部にはファイルをインストールしないため、Homebrewを好きな場所にインストールすることもできます。
    createpackages: Homebrew パッケージは <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">formulae
      と casks</a> です。
    hack: すべてGitとRubyで動作しているため、あなたがすでに持っている知識で簡単に変更を戻したりマージしたりできます。
    formula: 'HomebrewのformulaはシンプルなRubyスクリプトです:'
    editor: "$EDITORで開きます！"
    complement: HomebrewはmacOS（またはあなたのLinuxシステム）の機能を補完します。<code>gem</code>でRubyGemsを、そして<code>brew</code>で依存パッケージをインストールします。
    caskinstall: “アイコンをドラッグしてインストール…”のようなことをする必要はありません。<a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>ではmacOSアプリケーション、フォント、プラグイン、そしてオープンソースではないソフトウェアもインストールできます。
    caskcreate: caskの作成はformulaの作成と同じくらい簡単です。
    install:
      install: "\U0001F680 Homebrew をインストールする"
      paste: それを macOS ターミナル、Linux シェル、または WSL に貼り付けます。
      what: スクリプトは何を実行するかを説明し、実行する前に一時停止します。他の <a href="https://docs.brew.sh/Installation">
        インストール オプション</a> についてお読みください。
      pkginstaller: macOS を使用している場合は、対話型または無人 MDM インストール用の <code>.pkg</code> インストーラーをお試しください。
      githubrelease: <a href="https://github.com/Homebrew/brew/releases/latest">Homebrew
