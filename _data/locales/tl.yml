  pagecontent:
    search: Search
    language: Wika
    question: "\U0001F527 What Does Homebrew Do?"
    what: Homebrew installs <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">the command-line tools and applications you need</a> across
      macOS, Linux and WSL.
    how: 'Homebrew won’t install files outside its <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefix</a>.
      It installs each package into its own <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      inside the <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>,
      then symlinks its files into the prefix, the path where Homebrew is installed:
      <code>/opt/homebrew</code> on Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      on Linux/WSL and <code>/usr/local</code> on macOS Intel.'
    prefix: Hindi mag-i-install ang Homebrew ng mga file sa labas ng prefix nito at
      maaari kang maglagay ng pang-install ng Homebrew kung saan mo man gusto.
    createpackages: Homebrew packages are <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">formulae
      and casks</a>.
    hack: Ang lahat ng ito ay may Git at Ruby sa ilalim, kaya madali mong maibabalik
      ang mga pagbabago at pagsasama ng mga upstream at update.
    formula: 'Ang mga homebrew formula ay simpleng Ruby scripts:'
    editor: magbubukas sa $EDITOR!
    complement: Ang Homebrew ay umaakma sa macOS (o sa iyong Linux system). I-install
      ang iyong mga RubyGems sa <code>gem</code> at ang kanilang mga dependency sa
      <code>brew</code>.
    caskinstall: Hindi na kailangan ng “To install, drag this icon…”. Ang <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>
      ang mag i-install ang macOS apps, fonts, plugins at ibang non-open source software.
    caskcreate: Ang paggawa ng cask ay kasing simple ng paggawa ng formula.
