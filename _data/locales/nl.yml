      donate_summary: Homebrew is een non-profitproject dat volledig wordt gerund
        door vrijwilligers, niet door werknemers. We hebben uw geld nodig om te betalen
        voor software, hardware en hosting rond continue integratie en toekomstige
        verbeteringen aan het project. Elke donatie wordt besteed aan het beter maken
        van Homebrew voor onze gebruikers. Overweeg een regelmatige donatie via <a
        href="https://github.com/sponsors/Homebrew">GitHub Sponsors</a>, <a href="https://opencollective.com/homebrew">Open
        Collective</a> of <a href="https://www.patreon.com/homebrew">Patreon</a>.
        Homebrew wordt fiscaal gehost door het <a href="https://opencollective.com/opensource">Open
        Source Collective</a>.
      blog_summary: Lees de <a href="/blog/">Homebrew Blog</a> voor releaseopmerkingen,
