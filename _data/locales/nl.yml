    formulae_title: "\U0001F4E6 Homebrew-pakketten"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formules</a>
      zijn pakketdefinities die opdrachtregelprogramma's, bibliotheken en services
      bouwen op basis van upstream-broncode.
    formulae_help: Formulae in <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      vereisen menselijke beoordeling voordat ze worden geaccepteerd, gewijzigd of
      bijgewerkt en moeten open source-software zijn met een licentie die compatibel
      is met de <a href="https://wiki.debian.org/DFSGLicenses">Debian Free Software
      Guidelines</a>-licentie (zie de vereisten in <a href="https://docs.brew.sh/Acceptable-Formulae">Aanvaardbare
      formules</a>). Ze worden onderhouden door de beheerders en bijdragers van Homebrew.
      Maak formulae met behulp van het <a href="https://docs.brew.sh/Formula-Cookbook">Formulekookboek</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      zijn pakketdefinities die upstream vooraf gebouwde binaire bestanden installeren,
      zoals applicaties, lettertypen en plug-ins.
    casks_help: Sommige casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      buiten Homebrew, dus gebruik <code>brew upgrade --greedy</code> als je wilt
      dat Homebrew ze ook bijwerkt. Casks in <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      vereisen menselijke beoordeling voordat ze worden geaccepteerd, gewijzigd of
      bijgewerkt en moeten voldoen aan de vereisten in <a href="https://docs.brew.sh/Acceptable-Casks">Acceptabele
      vaten</a>. Ze worden onderhouden door de beheerders en bijdragers van Homebrew.
      Maak casks met behulp van het <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      Cookbook</a>.
    taps: Andere pakketbronnen worden <a href="https://docs.brew.sh/Taps">taps</a>
      genoemd; ze lieten iedereen zijn eigen formulae en casks onderhouden buiten
      de officieel ondersteunde opslagplaatsen. Lees hoe <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a> werkt voordat u niet-officiële taps gebruikt, en leer vervolgens hoe
      u <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">een tap</a>
      maakt en onderhoudt.
    bundle_title: "\U0001F4CB Homebrew Bundle-pakket"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      is declaratief: het gebruikt een <code>Brewfile</code> om de gewenste staat
      te beschrijven. Voer <code>brew bundel</code> uit om ontbrekende afhankelijkheden
      te installeren, verouderde afhankelijkheden bij te werken en de project- of
      machine-instellingen herhaalbaar te houden.'
    bundle_types: Homebrew Bundle ondersteunt formulae, casks, taps, Mac App Store
      apps, WinGet pakketten op WSL, VSCode extensies, Go pakketten, Cargo pakketten,
      uv tools, Flatpak pakketten, krew kubectl plug-ins en starten van achtergrondservices
      met <code>brouwdiensten</code>.
