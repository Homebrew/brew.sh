  pagecontent:
    search: Zoeken
    language: Taal
    question: "\U0001F527 Wat doet Homebrew?"
    what: Homebrew installeert <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">de opdrachtregelprogramma's en toepassingen die u nodig
      heeft</a> in macOS, Linux en WSL.
    how: 'Homebrew installeert geen bestanden buiten de <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefix</a>.
      Het installeert elk pakket in zijn eigen <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      in de <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>
      en koppelt de bestanden vervolgens symbolisch aan prefix, het pad waar Homebrew
      is geïnstalleerd: <code>/opt/homebrew</code> op Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      op Linux/WSL en <code>/usr/local</code> op macOS Intel.'
    prefix: Homebrew installeert geen bestanden buiten zijn locatie en je kunt de
      installatie plaatsen waar je wilt.
    createpackages: Homebrew pakketten zijn <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">formules
      en vaten</a>.
    hack: Onder de motorkap zitten Git en Ruby, dus hack erop los met de kennis dat
      je eenvoudig aanpassingen kunt terugdraaien en updates kunt samenvoegen.
    formula: 'Homebrew-formules zijn simpele Ruby-scripts:'
    editor: opent in $EDITOR!
    complement: Homebrew vult macOS aan. Installeer je RubyGems met <code>gem</code>
      en hun afhankelijkheden met <code>brew</code>.
    caskinstall: Geen "Om te installeren, sleept u dit pictogram..." meer. <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>
      installeert macOS-apps, lettertypen, plug-ins en andere niet-open source-software.
    caskcreate: Een cask maken is net zo eenvoudig als het maken van een formule.
    install:
      install: "\U0001F680 Installeer Homebrew"
      paste: Plak dat in de macOS Terminal, een Linux shell of WSL.
      what: Het script legt uit wat het gaat doen en pauzeert vervolgens voordat het
        het doet. Lees meer over andere <a href="https://docs.brew.sh/Installation">installatieopties</a>.
      pkginstaller: Als u macOS gebruikt, probeer dan ons installatieprogramma <code>.pkg</code>
        voor interactieve of onbeheerde MDM-installaties.
      githubrelease: Download het van <a href="https://github.com/Homebrew/brew/releases/latest">Homebrew's
        nieuwste GitHub release</a>.
      supported: Homebrew <a href="https://docs.brew.sh/Support-Tiers">ondersteunt</a>
        macOS (Sonoma 14 en nieuwer), Linux en Windows Subsystem for Linux (WSL).
