        aus.
      githubrelease: Laden Sie es von <a href="https://github.com/Homebrew/brew/releases/latest">Homebrews
        neuester GitHub-Version</a> herunter.
      supported: Homebrew <a href="https://docs.brew.sh/Support-Tiers">unterstützt</a>
        macOS (Sonoma 14 und neuer), Linux und Windows Subsystem for Linux (WSL).
