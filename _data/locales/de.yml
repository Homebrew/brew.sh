      donate_summary: Homebrew ist ein gemeinnütziges Projekt, das ausschließlich
        von Freiwilligen und nicht von Mitarbeitern geleitet wird. Wir benötigen Ihre
        Mittel, um Software, Hardware und Hosting rund um die kontinuierliche Integration
        und zukünftige Verbesserungen des Projekts zu finanzieren. Jede Spende wird
