  pagecontent:
    search: Suchen
    language: Sprache
    question: "\U0001F527 Was macht Homebrew?"
    what: Homebrew installiert <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">die Befehlszeilentools und Anwendungen, die Sie benötigen</a>
      auf macOS, Linux und WSL.
    how: 'Homebrew installiert keine Dateien außerhalb seines <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Präfix</a>.
      Es installiert jedes Paket in seinem eigenen <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      im <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>
      und verknüpft dann seine Dateien mit dem prefix, dem Pfad, in dem Homebrew installiert
      ist: <code>/opt/homebrew</code> auf Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      auf Linux/WSL und <code>/usr/local</code> auf macOS Intel.'
    prefix: Homebrew installiert keine Dateien außerhalb seines Verzeichnisses und
      du kannst eine Homebrew-Installation platzieren, wo du willst.
    createpackages: Homebrew-Pakete sind <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">formulae
      und casks</a>.
    hack: Unter der Haube stecken Git und Ruby – du kannst also nach Herzenslust hacken
      und weißt, dass du deine Änderungen problemlos rückgängig machen und Upstream-Updates
      einbinden kannst.
    formula: 'Homebrew-Formeln sind einfache Ruby-Skripte:'
    editor: Öffnet sich in $EDITOR!
    complement: Homebrew ergänzt macOS (oder dein Linux-System). Installiere deine
      RubyGems mit <code>gem</code> und ihre Abhängigkeiten mit <code>brew</code>.
    caskinstall: Schluss mit „Zum Installieren ziehe dieses Symbol…“. <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>
      installiert macOS-Apps, Schriftarten, Plugins und andere proprietäre Software.
    caskcreate: Ein Cask zu erstellen ist genauso einfach wie eine Formel.
