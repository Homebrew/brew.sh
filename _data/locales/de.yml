    formulae_title: "\U0001F4E6 Homebrew-Pakete"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      sind Paketdefinitionen, die Befehlszeilentools, Bibliotheken und Dienste aus
      Upstream-Quellcode erstellen.
    formulae_help: Formulae in <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      erfordern eine menschliche Überprüfung, bevor sie akzeptiert, geändert oder
      aktualisiert werden, und müssen Open-Source-Software mit einer <a href="https://wiki.debian.org/DFSGLicenses">Debian
      Free Software Guidelines</a>-kompatiblen Lizenz sein (siehe Anforderungen in
      <a href="https://docs.brew.sh/Acceptable-Formulae">Akzeptable Formeln</a>).
      Sie werden von den Betreuern und Mitwirkenden von Homebrew gepflegt. Erstellen
      Sie formulae mit Hilfe des <a href="https://docs.brew.sh/Formula-Cookbook">Formula
      Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      sind Paketdefinitionen, die vorgefertigte Upstream-Binärdateien wie Anwendungen,
      Schriftarten und Plugins installieren.
    casks_help: Einige casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      außerhalb von Homebrew, also verwenden Sie <code>brew upgrade --greedy</code>,
      wenn Sie möchten, dass Homebrew sie auch aktualisiert. Casks in <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      erfordern eine menschliche Überprüfung, bevor sie akzeptiert, geändert oder
      aktualisiert werden, und müssen die Anforderungen in <a href="https://docs.brew.sh/Acceptable-Casks">Akzeptable
      Fässer</a> erfüllen. Sie werden von den Betreuern und Mitwirkenden von Homebrew
      gepflegt. Erstellen Sie casks mit Hilfe des <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      Cookbook</a>.
    taps: Andere Paket-Repositorys heißen <a href="https://docs.brew.sh/Taps">taps</a>;
      Sie erlauben jedem, seine eigenen formulae und casks außerhalb der offiziell
      unterstützten Repositories zu verwalten. Lesen Sie, wie <a href="https://docs.brew.sh/Tap-Trust">tap
      Trust</a> funktioniert, bevor Sie nicht offizielles taps verwenden, und erfahren
      Sie dann, wie Sie <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">ein
      Tap Trust</a> erstellen und verwalten.
    bundle_title: "\U0001F4CB Homebrew Bundle-Paket"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      ist deklarativ: Es verwendet eine <code>Brewfile</code>, um den gewünschten
      Zustand zu beschreiben. Führen Sie <code>brew bundle</code> aus, um fehlende
      Abhängigkeiten zu installieren, veraltete zu aktualisieren und die Wiederholbarkeit
      des Projekt- oder Maschinen-Setups sicherzustellen.'
    bundle_types: Homebrew Bundle unterstützt formulae-, casks-, taps-, Mac App Store-Apps,
      WinGet-Pakete auf WSL, VSCode-Erweiterungen, Go-Pakete, Cargo-Pakete, uv-Tools,
      Flatpak-Pakete, krew kubectl-Plugins und das Starten von Hintergrunddiensten
      mit <code>Braudienste</code>.
