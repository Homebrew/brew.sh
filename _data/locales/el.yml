    question: "\U0001F527 Τι κάνει ο Homebrew;"
    what: Το Homebrew εγκαθιστά <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">τα εργαλεία γραμμής εντολών και τις εφαρμογές που χρειάζεστε</a>
      στα macOS, Linux και WSL.
    how: 'Το Homebrew δεν θα εγκαταστήσει αρχεία εκτός του <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">προθέματός του</a>. Εγκαθιστά κάθε πακέτο στο δικό του <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a> μέσα στο <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a> και στη συνέχεια συνδέει συμβολικά τα αρχεία του στο prefix, τη διαδρομή όπου είναι εγκατεστημένο το Homebrew: <code>/opt/homebrew</code> στο Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code> σε Linux/WSL και <code>/usr/local</code> σε macOS Intel.'
    prefix: Το Homebrew δεν θα εγκαταστήσει αρχεία έξω από αυτό και μπορείτε να εγκαταστήσετε
      το Homebrew όπου εσείς επιθυμείτε.
    createpackages: Τα πακέτα Homebrew είναι <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">formulae
      και βαρέλια</a>.
    hack: Είναι όλα βασισμένα στο Git και στην Ruby , έτσι μπορείτε να πορευτείτε
      γνωρίζοντας ότι μπορείτε εύκολα να επαναφέρετε τις τροποποιήσεις σας και να
      συγχωνεύσετε upstream ενημερώσεις
    formula: 'Οι φόρμουλες του Homebrew  είναι απλά Ruby scripts:'
    editor: ανοίγει στον $EDITOR!
    complement: Το Homebrew είναι το κομμάτι που λείπει από το macOS (ή το  Linux).
      Εγκαταστήστε τα RubyGems σας με την εντολή gem και τα dependencies τους με το
      <code>brew</code>.
    caskinstall: Όχι πια “Για να εγκαταστήσετε, σύρτε αυτό το εικονίδιο…”. Η εντολή
      <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a> εγκαθιστά εφαρμογές
      για macOS, γραμματοσειρές και πρόσθετα και άλλες εφαρμογές κλειστού κώδικα.
    caskcreate: Η δημιουργία ενός cask είναι τόσο απλή όσο και η δημιουργία μίας formula.
    install:
      install: "\U0001F680 Εγκαταστήστε Homebrew"
      paste: Επικολλήστε το στο τερματικό macOS, ένα κέλυφος Linux ή WSL.
      what: Το σενάριο εξηγεί τι θα κάνει και μετά σταματάει πριν το κάνει. Διαβάστε
