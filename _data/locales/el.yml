    formulae_title: "\U0001F4E6 Πακέτα Homebrew"
    formulae: Οι <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      είναι ορισμοί πακέτων που δημιουργούν εργαλεία γραμμής εντολών, βιβλιοθήκες
      και υπηρεσίες από τον πηγαίο κώδικα ανοδικής ροής.
    formulae_help: Οι τύποι στο <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a> απαιτούν ανθρώπινη αναθεώρηση πριν γίνουν αποδεκτοί, τροποποιηθούν ή ενημερωθούν και πρέπει να είναι λογισμικό ανοιχτού κώδικα με άδεια συμβατή με τις <a href="https://wiki.debian.org/DFSGLicenses">Debian Free Software Guidelines</a> (δείτε τις απαιτήσεις στο <a href="https://docs.brew.sh/Acceptable-Formulae">Acceptable Formulae</a>). Συντηρούνται από τους συντηρητές και τους συνεργάτες της Homebrew. Δημιουργήστε τύπους με τη βοήθεια του <a href="https://docs.brew.sh/Formula-Cookbook">Formula Cookbook</a>.
    casks: Τα <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      είναι ορισμοί πακέτων που εγκαθιστούν προκατασκευασμένα δυαδικά αρχεία, όπως
      εφαρμογές, γραμματοσειρές και πρόσθετα.
    casks_help: Κάποια casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      εκτός Homebrew, επομένως χρησιμοποιήστε την <code>brew upgrade --greedy</code>
      εάν θέλετε Homebrew να τα ενημερώσει επίσης. Τα Casks σε <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      απαιτούν έλεγχο από τον άνθρωπο πριν γίνουν αποδεκτά, αλλάξουν ή ενημερωθούν
      και πρέπει να πληρούν τις απαιτήσεις στο <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Casks</a>. Διατηρούνται από τους συντηρητές και τους συνεργάτες του Homebrew.
      Δημιουργήστε casks με τη βοήθεια του <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      Cookbook</a>.
    taps: Άλλα αποθετήρια πακέτων ονομάζονται <a href="https://docs.brew.sh/Taps">taps</a>;
      επιτρέπουν σε οποιονδήποτε να διατηρεί τα δικά του formulae και casks εκτός
      των επίσημα υποστηριζόμενων αποθετηρίων. Διαβάστε πώς λειτουργεί το <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a> πριν χρησιμοποιήσετε το μη επίσημο taps και, στη συνέχεια, μάθετε
      πώς να <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">δημιουργείτε
      και να διατηρείτε ένα tap</a>.
    bundle_title: "\U0001F4CB Πακέτο Homebrew Bundle"
    bundle: 'Το <a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      είναι δηλωτικό: χρησιμοποιεί ένα <code>Brewfile</code> για να περιγράψει την
      κατάσταση που θέλετε. Εκτελέστε το <code>brew bundle</code> για να εγκαταστήσετε
      εξαρτήσεις που λείπουν, να ενημερώσετε τις παλιές και να διατηρήσετε επαναλαμβανόμενες
      τις ρυθμίσεις του έργου ή του μηχανήματος.'
    bundle_types: Το Homebrew Bundle υποστηρίζει formulae, casks, taps, εφαρμογές Mac App Store, πακέτα WinGet σε WSL, επεκτάσεις VSCode, πακέτα Go, πακέτα Cargo, εργαλεία uv, πακέτα Flatpak, πρόσθετα krew kubectl και εκκίνηση υπηρεσιών παρασκηνίου με <code>brew services</code>.
