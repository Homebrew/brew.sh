      pkginstaller: Εάν βρίσκεστε στο macOS, δοκιμάστε το πρόγραμμα εγκατάστασης <code>.pkg</code>
        για διαδραστικές ή χωρίς επίβλεψη εγκαταστάσεις MDM.
      githubrelease: Κατεβάστε το από την <a href="https://github.com/Homebrew/brew/releases/latest">την
