      further_summary: Διαβάστε τους οδηγούς <a href="https://docs.brew.sh/Installation">εγκατάστασης</a>, <a href="https://docs.brew.sh/Troubleshooting">αντιμετώπισης προβλημάτων</a>, <a href="https://github.com/Homebrew/brew/blob/HEAD/docs/How-To-Open-a-Homebrew-Pull-Request.md">συνεισφοράς</a> και <a href="https://docs.brew.sh/Formula-Cookbook">ανάπτυξης</a>, συμπεριλαμβανομένου του <a href="https://docs.brew.sh/FAQ">FAQ (συχνές ερωτήσεις)</a> στο <a href="https://docs.brew.sh/">docs.brew.sh</a>.
      donate_summary: Το Homebrew είναι ένα μη κερδοσκοπικό έργο που διευθύνεται αποκλειστικά
        από εθελοντές και όχι από υπαλλήλους. Χρειαζόμαστε τα χρήματά σας για να πληρώσουμε
        για λογισμικό, υλικό και φιλοξενία γύρω από τη συνεχή ενοποίηση και τις μελλοντικές
        βελτιώσεις στο έργο. Κάθε δωρεά θα δαπανηθεί για τη βελτίωση του Homebrew
        για τους χρήστες μας. Σκεφτείτε μια τακτική δωρεά μέσω των <a href="https://github.com/sponsors/Homebrew">GitHub
        Sponsors</a>, <a href="https://opencollective.com/homebrew">Open Collective</a>
        ή <a href="https://www.patreon.com/homebrew">Patreon</a>. Το Homebrew φιλοξενείται
        φορολογικά από τη <a href="https://opencollective.com/opensource">Open Source
        Collective</a>.
      blog_summary: Διαβάστε το <a href="/blog/">Homebrew Blog</a> για σημειώσεις
        έκδοσης, ενημερώσεις έργου και ανακοινώσεις.
      community_summary: Έχετε κάποια ερώτηση ή χρειάζεστε βοήθεια για να επιλέξετε
