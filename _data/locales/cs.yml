    question: "\U0001F527 Co dělá Homebrew?"
    what: Homebrew nainstaluje <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">nástroje a aplikace příkazového řádku, které potřebujete</a>
      do macOS, Linux a WSL.
    how: 'Homebrew nenainstaluje soubory mimo svou <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefix</a>.
      Nainstaluje každý balíček do svého vlastního <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      uvnitř <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>,
      poté symbolicky propojí jeho soubory do prefix, cesty, kde je nainstalován Homebrew:
      <code>/opt/homebrew</code> na Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      na Linux/WSL a <code>/usr/local</code> na macOS Intel.'
    prefix: Homebrew nebude instalovat soubory mimo jeho prefix, Homebrew můžete nainstalovat
      kam chcete.
    createpackages: Homebrew balíčky jsou <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">vzorce
      a sudy</a>.
    hack: Všechno je to jen Git a Ruby, takže se současnými dovednostmi můžete snadno
      vytvářet modifikace a spojovat aktualizace z upstreamu.
    formula: 'Formule Homebrew jsou jednoduché Ruby scripty:'
    editor: otevře se v $EDITOR!
    complement: Homebrew doplňuje macOS. Instalujte vaše gemy příkazem <code>gem</code>
      a jejich závislosti příkazem <code>brew</code>.
    caskinstall: “To install, drag this icon…” no more. <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>
      installs macOS apps, fonts and plugins and other non-open source software.
    caskcreate: Making a cask is as simple as creating a formula.
