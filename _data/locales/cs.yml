    formulae_title: "\U0001F4E6 Balíčky Homebrew"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      jsou definice balíčků, které vytvářejí nástroje příkazového řádku, knihovny
      a služby z upstream zdrojového kódu.
    formulae_help: Vzorce v <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      vyžadují kontrolu člověkem před tím, než budou přijaty, změněny nebo aktualizovány,
      a musí jít o software s otevřeným zdrojovým kódem s licencí kompatibilní s <a
      href="https://wiki.debian.org/DFSGLicenses">Pokyny pro svobodný software Debian</a>
      (viz požadavky v <a href="https://docs.brew.sh/Acceptable-Formulae">Acceptable
      Formulae</a>). Jsou spravovány správci a přispěvateli Homebrew. Vytvářejte
      vzorce s pomocí <a href="https://docs.brew.sh/Formula-Cookbook">Formula Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      jsou definice balíčků, které instalují upstream předem vytvořené binární soubory,
      jako jsou aplikace, fonty a pluginy.
    casks_help: Některé casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      mimo Homebrew, takže použijte <code>brew upgrade --greedy</code>, pokud chcete,
      aby je Homebrew aktualizoval také. Casks v <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      vyžadují kontrolu člověkem, než budou přijaty, změněny nebo aktualizovány, a
      musí splňovat požadavky v <a href="https://docs.brew.sh/Acceptable-Casks">Přijatelné
      sudy</a>. Jsou spravovány správci a přispěvateli Homebrew. Vytvořte casks s
      pomocí <a href="https://docs.brew.sh/Cask-Cookbook">Cask Cookbook</a>.
    taps: Další úložiště balíčků se nazývají <a href="https://docs.brew.sh/Taps">taps</a>;
      umožňují komukoli udržovat jejich vlastní formulae a casks mimo oficiálně podporovaná
      úložiště. Než začnete používat neoficiální taps, přečtěte si, jak funguje <a
      href="https://docs.brew.sh/Tap-Trust">tap trust</a>, a poté se naučte, jak <a
      href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">vytvořit a udržovat
      tap</a>.
    bundle_title: "\U0001F4CB Balík Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      je deklarativní: k popisu požadovaného stavu používá <code>Brewfile</code>.
      Spusťte <code>brew bundle</code> pro instalaci chybějících závislostí, aktualizaci
      zastaralých a zachování opakovatelnosti nastavení projektu nebo stroje.'
    bundle_types: Homebrew Bundle podporuje vzorce, sudy, kohoutky, aplikace Mac App
      Store, balíčky WinGet na WSL, rozšíření VSCode, balíčky Go, balíčky Cargo, uv
      nástroje, balíčky Flatpak, pluginy krew kubectl a spouštění služeb na pozadí
      pomocí <code>služeb vaření</code>.
