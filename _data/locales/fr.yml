  pagecontent:
    search: Rechercher
    language: Langue
    question: "\U0001F527 Que fait Homebrew ?"
    what: Homebrew installe <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">les outils et applications de ligne de commande dont vous
      avez besoin</a> sur macOS, Linux et WSL.
    how: 'Homebrew n''installera pas de fichiers en dehors de son <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">préfixe</a>.
      Il installe chaque package dans son propre <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      à l''intérieur du <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>,
      puis lie symboliquement ses fichiers dans le prefix, le chemin où Homebrew est
      installé : <code>/opt/homebrew</code> sur Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      sur Linux/WSL et <code>/usr/local</code> sur macOS Intel.'
    prefix: Homebrew n’installera pas de fichiers en dehors de son préfixe, et vous
      pouvez placer Homebrew où vous le désirez.
    createpackages: Les packages Homebrew sont des formules <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">
      et des fûts</a>.
    hack: Homebrew utilise Git et Ruby, vous pouvez donc faire des modifications sans
      crainte, sachant que vous pourrez facilement les annuler et les intégrer avec
      les mises à jour futures.
    formula: 'Les formules Homebrew sont de simples scripts Ruby&nbsp;:'
    editor: ouvre avec $EDITOR !
    complement: Homebrew est un complément pour macOS. Installez vos RubyGems avec
      <code>gem</code>, et leurs dépendances avec <code>brew</code>.
    caskinstall: “To install, drag this icon…” rien de plus. <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>
      installe des applications macOS, des fontes, des plug-ins et divers logiciels
      non-open source.
    caskcreate: Créer un cask est aussi simple que de créer une formule.
    install:
      install: "\U0001F680 Installez Homebrew"
      paste: Collez-le dans le terminal macOS, un shell Linux ou WSL.
      what: Le script explique ce qu'il va faire, puis fait une pause avant de le faire. Découvrez les <a href="https://docs.brew.sh/Installation">autres options d'installation</a>.
      pkginstaller: Si vous utilisez macOS, essayez notre programme d'installation
        <code>.pkg</code> pour des installations MDM interactives ou sans surveillance.
      githubrelease: Téléchargez-le à partir de la dernière version GitHub de <a href="https://github.com/Homebrew/brew/releases/latest">Homebrew</a>.
      supported: Homebrew <a href="https://docs.brew.sh/Support-Tiers">prend en charge</a>
        macOS (Sonoma 14 et plus récent), Linux et Windows Subsystem for Linux (WSL).
