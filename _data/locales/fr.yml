    formulae_title: "\U0001F4E6 Paquets Homebrew"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      sont des définitions de packages qui créent des outils, des bibliothèques et
      des services en ligne de commande à partir du code source en amont.
    formulae_help: Formulae dans <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      nécessitent un examen humain avant d'être acceptés, modifiés ou mis à jour et
      doivent être des logiciels open source avec une licence compatible <a href="https://wiki.debian.org/DFSGLicenses">Directives
      du logiciel libre Debian</a> (voir les exigences dans <a href="https://docs.brew.sh/Acceptable-Formulae">Formules
      acceptables</a>). Ils sont maintenus par les mainteneurs et contributeurs de
      Homebrew. Créez formulae avec l'aide du <a href="https://docs.brew.sh/Formula-Cookbook">Formula
      Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      sont des définitions de packages qui installent des binaires prédéfinis en amont
      tels que des applications, des polices et des plugins.
    casks_help: Certains casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      en dehors de Homebrew, utilisez donc <code>brew update --greedy</code> si vous
      souhaitez que Homebrew les mette également à jour. Casks dans <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      nécessitent un examen humain avant d'être acceptés, modifiés ou mis à jour et
      doivent répondre aux exigences de <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Casks</a>. Ils sont maintenus par les mainteneurs et contributeurs de Homebrew.
      Créez casks avec l'aide du <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      Cookbook</a>.
    taps: Les autres référentiels de packages sont appelés <a href="https://docs.brew.sh/Taps">taps</a> ;
      ils permettent à quiconque de conserver ses propres formulae et casks en dehors
      des référentiels officiellement pris en charge. Lisez comment fonctionne <a
      href="https://docs.brew.sh/Tap-Trust">tap trust</a> avant d'utiliser taps non
      officiel, puis apprenez comment <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">créer
      et gérer un tap</a>.
    bundle_title: "\U0001F4CB Paquet Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      est déclaratif : il utilise un <code>Brewfile</code> pour décrire l''état souhaité.
      Exécutez <code>brew bundle</code> pour installer les dépendances manquantes,
      mettre à jour les dépendances obsolètes et conserver la répétabilité de la configuration
      du projet ou de la machine.'
    bundle_types: Homebrew Bundle prend en charge les applications formulae, casks,
      taps, Mac App Store, les packages WinGet sur WSL, les extensions VSCode, les
      packages Go, les packages Cargo, les outils uv, les packages Flatpak, les plugins
      krew kubectl et le démarrage des services d'arrière-plan avec <code>services
      de brassage</code>.
