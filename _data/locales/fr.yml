      donate_summary: Homebrew est un projet à but non lucratif géré entièrement par
        des bénévoles et non par des employés. Nous avons besoin de vos fonds pour
        payer les logiciels, le matériel et l'hébergement autour de l'intégration
        continue et des améliorations futures du projet. Chaque don sera consacré
