    formulae_title: "\U0001F4E6 Gói Homebrew"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      là các định nghĩa gói xây dựng các công cụ dòng lệnh, thư viện và dịch vụ từ
      mã nguồn ngược dòng.
    formulae_help: Formulae trong <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      yêu cầu sự xem xét của con người trước khi chúng được chấp nhận, thay đổi hoặc
      cập nhật và phải là phần mềm nguồn mở có <a href="https://wiki.debian.org/DFSGLicenses">Nguyên
      tắc phần mềm miễn phí Debian</a> giấy phép tương thích (xem các yêu cầu trong
      <a href="https://docs.brew.sh/Acceptable-Formulae">Công thức được chấp nhận</a>).
      Chúng được duy trì bởi những người duy trì và đóng góp của Homebrew. Tạo formulae
      với sự trợ giúp từ <a href="https://docs.brew.sh/Formula-Cookbook">Sách dạy
      nấu ăn công thức</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      là các định nghĩa gói cài đặt các tệp nhị phân dựng sẵn ngược dòng như ứng dụng,
      phông chữ và plugin.
    casks_help: Một số casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      bên ngoài Homebrew, vì vậy hãy sử dụng <code>brew nâng cấp --greedy</code> nếu
      bạn cũng muốn Homebrew cập nhật chúng. Casks trong <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      cần có sự xem xét của con người trước khi chúng được chấp nhận, thay đổi hoặc
      cập nhật và phải đáp ứng các yêu cầu trong <a href="https://docs.brew.sh/Acceptable-Casks">Cask
      có thể chấp nhận</a>. Chúng được duy trì bởi những người duy trì và đóng góp
      của Homebrew. Tạo casks với sự trợ giúp từ <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      Cookbook</a>.
    taps: Các kho lưu trữ gói khác được gọi là <a href="https://docs.brew.sh/Taps">taps</a>;
      họ cho phép bất cứ ai duy trì formulae và casks của riêng họ bên ngoài các kho
      lưu trữ được hỗ trợ chính thức. Hãy đọc cách <a href="https://docs.brew.sh/Tap-Trust">tap
      Trust</a> hoạt động trước khi sử dụng taps không chính thức, sau đó tìm hiểu
      cách <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">tạo và
      duy trì một tap</a>.
    bundle_title: "\U0001F4CB Gói Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      mang tính khai báo: nó sử dụng <code>Brewfile</code> để mô tả trạng thái bạn
      muốn. Chạy <code>brew Bundle</code> để cài đặt các phần phụ thuộc còn thiếu,
      cập nhật những phần phụ thuộc đã lỗi thời và giữ cho quá trình thiết lập dự
      án hoặc máy có thể lặp lại.'
    bundle_types: Homebrew Bundle hỗ trợ các ứng dụng formulae, casks, taps, Mac App
      Store, WinGet trên các gói WSL, VSCode, các gói Go, các gói Cargo, các công
      cụ uv, các gói Flatpak, các plugin krew kubectl và bắt đầu các dịch vụ nền với
      <code>brew services</code>.
