    question: "\U0001F527 Homebrew làm gì?"
    what: Homebrew cài đặt <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">các công cụ dòng lệnh và ứng dụng bạn cần</a> trên macOS,
      Linux và WSL.
    how: 'Homebrew sẽ không cài đặt các tập tin bên ngoài <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefix</a>
      của nó. Nó cài đặt từng gói vào <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      của chính nó bên trong <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>,
      sau đó liên kết tượng trưng các tệp của nó vào prefix, đường dẫn nơi Homebrew
      được cài đặt: <code>/opt/homebrew</code> trên Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      trên Linux/WSL và <code>/usr/local</code> trên macOS Intel.'
    prefix: Homebrew sẽ không cài tập tin ở ngoài chỉ định của prefix, bạn có thể
      đặt cài đặt của Homebrew vào bất cư nơi nào bạn thích.
    createpackages: Homebrew gói là <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">công
      thức và thùng</a>.
    hack: Tất cả là Git và Ruby ở bên dưới, cho nên xin hãy thoải mái hack vì biết
      rằng bạn có thể hồi phục các thay đổi dễ dàng và nhập nó vào nhánh ở nguồn.
