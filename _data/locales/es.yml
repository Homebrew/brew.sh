    formulae_title: "\U0001F4E6 Paquetes de Homebrew"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Fórmulas</a>
      son definiciones de paquetes que crean herramientas, bibliotecas y servicios
      de línea de comandos a partir de código fuente ascendente.
    formulae_help: Formulae en <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      requieren revisión humana antes de ser aceptados, modificados o actualizados
      y deben ser software de código abierto con una licencia compatible con <a href="https://wiki.debian.org/DFSGLicenses">Pautas
      de software libre de Debian</a> (consulte los requisitos en <a href="https://docs.brew.sh/Acceptable-Formulae">Fórmulas
      aceptables</a>). Son mantenidos por los mantenedores y contribuyentes de Homebrew.
      Cree formulae con la ayuda del <a href="https://docs.brew.sh/Formula-Cookbook">Formula
      Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      son definiciones de paquetes que instalan archivos binarios prediseñados, como
      aplicaciones, fuentes y complementos.
    casks_help: Algunos casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      fuera de Homebrew, así que use <code>brew update --greedy</code> si desea que
      Homebrew los actualice también. Casks en <a href="https://github.com/Homebrew/homebrew-cask">homebrew/barril</a>
      requieren revisión humana antes de ser aceptados, modificados o actualizados
      y deben cumplir con los requisitos en <a href="https://docs.brew.sh/Acceptable-Casks">Barriles
      Aceptables</a>. Son mantenidos por los mantenedores y contribuyentes de Homebrew.
      Cree casks con la ayuda del <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      Cookbook</a>.
    taps: Otros repositorios de paquetes se llaman <a href="https://docs.brew.sh/Taps">taps</a>;
      permiten que cualquiera mantenga sus propios formulae y casks fuera de los repositorios
      oficialmente admitidos. Lea cómo funciona <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a> antes de usar taps no oficial, luego aprenda cómo <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">crear
      y mantener un tap</a>.
    bundle_title: "\U0001F4CB Paquete Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      es declarativo: utiliza un <code>Brewfile</code> para describir el estado que
      desea. Ejecute <code>brew bundle</code> para instalar las dependencias que faltan,
      actualizar las obsoletas y mantener la configuración del proyecto o de la máquina
      repetible.'
    bundle_types: Homebrew Bundle admite aplicaciones formulae, casks, taps, Mac App
      Store, paquetes WinGet en WSL, extensiones VSCode, paquetes Go, paquetes Cargo,
      herramientas uv, paquetes Flatpak, complementos krew kubectl y iniciando servicios
      en segundo plano con <code>brew Services</code>.
