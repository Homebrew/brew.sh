      donate_summary: Homebrew es un proyecto sin fines de lucro dirigido íntegramente
        por voluntarios, no por empleados. Necesitamos sus fondos para pagar el software,
        el hardware y el alojamiento en torno a la integración continua y futuras
        mejoras del proyecto. Cada donación se gastará en mejorar Homebrew para nuestros
        usuarios. Considere una donación regular a través de <a href="https://github.com/sponsors/Homebrew">GitHub
        Sponsors</a>, <a href="https://opencollective.com/homebrew">Open Collective</a>
        o <a href="https://www.patreon.com/homebrew">Patreon</a>. Homebrew está alojado
        fiscalmente en <a href="https://opencollective.com/opensource">Open Source
        Collective</a>.
