  pagecontent:
    search: Buscar
    language: Idioma
    question: "\U0001F527 ¿Qué hace Homebrew?"
    what: Homebrew instala <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">las herramientas y aplicaciones de línea de comandos que
      necesita</a> en macOS, Linux y WSL.
    how: 'Homebrew no instalará archivos fuera de su <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefijo</a>.
      Instala cada paquete en su propio <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      dentro de <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>,
      luego vincula simbólicamente sus archivos en prefix, la ruta donde está instalado
      Homebrew: <code>/opt/homebrew</code> en Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      en Linux/WSL y <code>/usr/local</code> en macOS Intel.'
    prefix: Homebrew nunca instala archivos fuera de su prefijo, y puedes colocar
      la instalación de Homebrew donde quieras.
    createpackages: Los paquetes Homebrew son <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">fórmulas
      y barricas</a>.
    hack: Homebrew está basado en Git y Ruby, así que desarrolla tranquilo, con el
      conocimiento de que puedes revertir tus cambios e integrar actualizaciones con
      total facilidad.
    formula: 'Las fórmulas de Homebrew son simples <i>scripts</i> en Ruby:'
    editor: "¡Se abre en $EDITOR!"
    complement: Homebrew complementa macOS (o tu sistema Linux). Instala tus <i>RubyGems</i>
      con <code>gem</code> y sus dependencias con <code>brew</code>.
    caskinstall: Ya no más “Para instalar, arrastre este icono…”. <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>
      instala aplicaciones de macOS, fuentes, plugins y otro software de código no
      abierto.
    caskcreate: Hacer un cask es igual de simple que crear una fórmula.
    install:
      install: "\U0001F680 Instalar Homebrew"
      paste: Pegue eso en la terminal macOS, un shell Linux o WSL.
      what: El guión explica lo que hará y luego hace una pausa antes de hacerlo.
        Lea sobre otras <a href="https://docs.brew.sh/Installation">opciones de instalación</a>.
      pkginstaller: Si está en macOS, pruebe nuestro instalador <code>.pkg</code>
        para instalaciones MDM interactivas o desatendidas.
      githubrelease: Descárguelo de la <a href="https://github.com/Homebrew/brew/releases/latest">última versión de Homebrew en GitHub</a>.
      supported: Homebrew <a href="https://docs.brew.sh/Support-Tiers">admite</a>
        macOS (Sonoma 14 y posteriores), Linux y Windows Subsystem for Linux (WSL).
    doc:
      man: Lea el manual Homebrew con <a href="https://docs.brew.sh/Manpage"><code>man
        brew</code></a>.
