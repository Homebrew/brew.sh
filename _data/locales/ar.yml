    question: "\U0001F527 ماذا يفعل Homebrew؟"
    what: يقوم Homebrew بتثبيت <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">أدوات وتطبيقات سطر الأوامر التي تحتاجها</a> عبر macOS
      وLinux وWSL.
    how: 'Homebrew لن يقوم بتثبيت الملفات خارج <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">البادئة</a>.
      يقوم بتثبيت كل حزمة في <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      الخاصة بها داخل <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>،
      ثم يربط ملفاتها في prefix، المسار الذي تم تثبيت Homebrew فيه: <code>/opt/homebrew</code>
      على Apple Silicon، <code>/home/linuxbrew/.linuxbrew</code> على Linux/WSL و<code>/usr/local</code>
      على macOS Intel.'
    prefix: لن يثبّت Homebrew ملفات خارج المسار المحدد "prefix" وبإمكانك تحديد أي
      مسار تريد.
    createpackages: Homebrew الحزم هي <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">الصيغ
      وبراميل</a>.
    hack: جميع محتويات Homebrew متكونة من Git و Ruby، فلذلك أبحر بخبرتك وأضف ما تريد
      و اعلم أنك تستطيع التراجع عن تغييراتك أو دمجها بسهولة.
    formula: 'وصفات "formulae" الـHomebrew عبارة عن سكربتات Ruby بسيطة:'
    editor: opens in $EDITOR!
    complement: Homebrew مكمل للـmacOS (أو أنظمت Linux). ثبّت RubyGems بواسطة <code>gem</code>
      وثبّت متطلباتها بواسطة <code>brew</code>.
    caskcreate: سهولة صنع cask جديد بسهولة صنع وتكوين الوصفات "formula".
    caskinstall: لا مزيد من “To install, drag this icon…”. يثبّت <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>
      تطبيقات macOS، الخطوط وأي اضافات أخرى.
    install:
      install: "\U0001F680 تثبيت Homebrew"
      paste: الصق ذلك في macOS Terminal، أو Linux Shell أو WSL.
      what: يشرح البرنامج النصي ما سيفعله ثم يتوقف مؤقتًا قبل أن يفعله. اقرأ عن <a href="https://docs.brew.sh/Installation">خيارات التثبيت الأخرى</a>.
      pkginstaller: إذا كنت تستخدم macOS، فجرّب أداة التثبيت <code>.pkg</code> الخاصة
        بنا لعمليات تثبيت MDM التفاعلية أو غير المراقبة.
      githubrelease: قم بتنزيله من أحدث إصدار <a href="https://github.com/Homebrew/brew/releases/latest">Homebrew
        GitHub</a>.
      supported: Homebrew <a href="https://docs.brew.sh/Support-Tiers">يدعم</a> macOS
        (Sonoma 14 والأحدث)، Linux وWindows Subsystem for Linux (WSL).
