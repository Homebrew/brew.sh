    formulae_title: "\U0001F4E6 حزم Homebrew"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      هي تعريفات الحزمة التي تبني أدوات سطر الأوامر والمكتبات والخدمات من التعليمات
      البرمجية المصدر الأولية.
    formulae_help: Formulae في <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      تتطلب مراجعة بشرية قبل قبولها أو تغييرها أو تحديثها ويجب أن تكون برامج مفتوحة
      المصدر مع ترخيص متوافق مع <a href="https://wiki.debian.org/DFSGLicenses">Debian
      Free Software Guidelines</a> (راجع المتطلبات في <a href="https://docs.brew.sh/Acceptable-Formulae">Acceptable
      Formulae</a>). تتم صيانتها بواسطة المشرفين والمساهمين في Homebrew. أنشئ formulae
      بمساعدة كتاب الطبخ <a href="https://docs.brew.sh/Formula-Cookbook">Formula Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      عبارة عن تعريفات حزم تقوم بتثبيت الثنائيات المعدة مسبقًا مثل التطبيقات والخطوط
      والمكونات الإضافية.
    casks_help: بعض casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">التحديث
      التلقائي</a> خارج Homebrew، لذا استخدم <code>brew ترقية --greedy</code> إذا
      كنت تريد Homebrew لتحديثها أيضًا. Casks في <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      تتطلب مراجعة بشرية قبل قبولها أو تغييرها أو تحديثها ويجب أن تفي بالمتطلبات الواردة
      في <a href="https://docs.brew.sh/Acceptable-Casks">العلب المقبولة</a>. تتم صيانتها
      بواسطة المشرفين والمساهمين في Homebrew. أنشئ casks بمساعدة <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      Cookbook</a>.
    taps: تسمى مستودعات الحزم الأخرى <a href="https://docs.brew.sh/Taps">taps</a>؛
      يسمحون لأي شخص بالحفاظ على formulae وcasks الخاصين به خارج المستودعات المدعومة
      رسميًا. اقرأ كيفية عمل <a href="https://docs.brew.sh/Tap-Trust">tap Trust</a>
      قبل استخدام taps غير الرسمي، ثم تعرف على كيفية <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">إنشاء
      نقرة</a> والحفاظ عليها.
    bundle_title: "\U0001F4CB حزمة Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      تعريفية: فهي تستخدم <code>Brewfile</code> لوصف الحالة التي تريدها. قم بتشغيل
      <code>brew Bundle</code> لتثبيت التبعيات المفقودة وتحديث التبعيات القديمة والحفاظ
      على إمكانية تكرار إعداد المشروع أو الجهاز.'
    bundle_types: Homebrew Bundle يدعم formulae، casks، taps، Mac App Store التطبيقات،
      WinGet الحزم على WSL، VSCode الحزم، Go الحزم، Cargo الحزم، uv الأدوات، Flatpak
      الحزم، krew kubectl الإضافات و بدء خدمات الخلفية باستخدام <code>brew Services</code>.
