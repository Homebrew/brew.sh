  pagecontent:
    search: Sök
    language: Språk
    question: "\U0001F527 Vad gör Homebrew?"
    what: Homebrew installerar <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages"> kommandoradsverktygen och applikationerna du behöver</a>
      över macOS, Linux och WSL.
    how: 'Homebrew kommer inte att installera filer utanför dess <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefix</a>.
      Den installerar varje paket i sin egen <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      inuti <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>
      och symlinkar sedan sina filer till prefix, sökvägen där Homebrew är installerad:
      <code>/opt/homebrew</code> på Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      på Linux/WSL och <code>/usr/local</code> på macOS Intel.'
    prefix: Homebrew kommer inte att installera filer utanför sitt prefix och du kan
      placera en installation av Homebrew vart du vill.
    createpackages: Homebrew paket är <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">formler
      och fat</a>.
    hack: Under ytan är allt Git och Ruby, så du kan själv förändra kod med vetskapen
      att du enkelt kan ångra dina ändringar eller sammanfoga dem med andras modifikationer.
    formula: 'Homebrews formler är enkla Rubyskript:'
    editor: öppnas i $EDITOR!
    complement: Homebrew kompletterar macOS (eller ditt Linux system). Installera
      RubyGems med <code>gem</code> och sedan paketens beroenden med <code>brew</code>.
    caskinstall: Glöm instruktioner som lyder “För att installera, dra denna ikon
      till…” . <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a> installerar
      macOS applikationer, fonter, plugin-program, och annan mjukvara med icke-öppen
      källkod.
    caskcreate: Att skapa en 'cask' är lika enkelt som att skapa en formel.
    install:
      install: "\U0001F680 Installera Homebrew"
      paste: Klistra in det i macOS-terminalen, ett Linux-skal eller WSL.
      what: Manuset förklarar vad det kommer att göra och pausar sedan innan det gör
        det. Läs om andra <a href="https://docs.brew.sh/Installation">installationsalternativ</a>.
      pkginstaller: Om du använder macOS, prova vårt <code>.pkg</code> installationsprogram
