    formulae_title: "\U0001F4E6 Homebrew-paket"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      är paketdefinitioner som bygger kommandoradsverktyg, bibliotek och tjänster
      från uppströms källkod.
    formulae_help: Formulae i <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      kräver mänsklig granskning innan de accepteras, ändras eller uppdateras och
      måste vara programvara med öppen källkod med en <a href="https://wiki.debian.org/DFSGLicenses">Debian
      Free Software Guidelines</a>-kompatibel licens (se kraven i <a href="https://docs.brew.sh/Acceptable-Formulae">Acceptable
      Formulae</a>). De underhålls av Homebrews underhållare och bidragsgivare. Skapa
      formulae med hjälp av <a href="https://docs.brew.sh/Formula-Cookbook">Formula
      Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      är paketdefinitioner som installerar uppströms förbyggda binärer såsom applikationer,
      typsnitt och plugins.
    casks_help: Vissa casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      utanför Homebrew, så använd <code>brew upgrade --greedy</code> om du vill att
      Homebrew ska uppdatera dem också. Casks i <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      kräver mänsklig granskning innan de accepteras, ändras eller uppdateras och
      måste uppfylla kraven i <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Casks</a>. De underhålls av Homebrews underhållare och bidragsgivare. Skapa
      casks med hjälp av <a href="https://docs.brew.sh/Cask-Cookbook">Cask Cookbook</a>.
    taps: Andra paketförråd kallas <a href="https://docs.brew.sh/Taps">taps</a>; de
      låter vem som helst behålla sina egna formulae och casks utanför de officiellt
      stödda arkiven. Läs hur <a href="https://docs.brew.sh/Tap-Trust">tap trust</a>
      fungerar innan du använder icke-officiell taps och lär dig sedan hur du <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">skapar
      och underhåller en tap</a>.
    bundle_title: "\U0001F4CB Homebrew Bundle-paket"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      är deklarativ: den använder en <code>Brewfile</code> för att beskriva det tillstånd
      du vill ha. Kör <code>brew bundle</code> för att installera saknade beroenden,
      uppdatera föråldrade och hålla projekt- eller maskininställningar repeterbara.'
    bundle_types: Homebrew Bundle stöder formler, fat, kranar, Mac App Store-appar,
      WinGet-paket på WSL, VSCode-tillägg, Go-paket, Cargo-paket, uv-verktyg, Flatpak-paket,
      krew kubectl-plugin-program och startbakgrundstjänster med <code>bryggtjänster</code>.
