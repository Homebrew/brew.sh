      githubrelease: Ladda ner den från <a href="https://github.com/Homebrew/brew/releases/latest">Homebrews
        senaste GitHub release</a>.
      supported: Homebrew <a href="https://docs.brew.sh/Support-Tiers">stöder</a>
        macOS (Sonoma 14 och nyare), Linux och Windows Subsystem for Linux (WSL).
