      Cookbook</a> 的協助下建立 formulae。
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      是安裝上游預先建置二進位檔案（例如應用程式、字型和外掛程式）的套件定義。
    casks_help: Homebrew 以外的一些 casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      ，因此如果您希望 Homebrew 也更新它們，請使用 <code>brew update --greedy</code> 。 <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      中的 Casks 在接受、更改或更新之前需要人工審核，並且必須滿足 <a href="https://docs.brew.sh/Acceptable-Casks">
      可接受的木桶 </a> 中的要求。它們由 Homebrew 的維護者和貢獻者維護。在 <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      Cookbook</a> 的幫助下建立 casks。
    taps: 其他套件儲存庫稱為 <a href="https://docs.brew.sh/Taps">taps</a>；他們允許任何人在官方支援的儲存庫之外維護自己的
      formulae 和 casks 。在使用非官方 taps 之前，請先閱讀 <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a> 的工作原理，然後了解如何 <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">
      建立和維護 Tap</a>。
    bundle_title: "\U0001F4CB Homebrew Bundle 套件"
    bundle: <a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
