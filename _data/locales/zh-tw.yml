    how: Homebrew 不會安裝其<a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">前綴</a>以外的檔案。它將每個套件安裝到
      <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>
      內的自己的 <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      中，然後將其文件符號上的前綴路徑安裝（Home） <code>/opt/homebrew</code>， Linux/WSL 上的 <code>/home/linuxbrew/.linuxbrew</code>
      和 macOS Intel 上的 <code>/usr/local</code>。
    prefix: Homebrew 不會把檔案放在 prefix 之外的地方，因此可以將 Homebrew 安放在任何位置。
