    bundle_types: Homebrew Bundle 支援 formulae、casks、taps、Mac App Store 應用程式、WSL 上的 WinGet 套件、VSCode 擴充功能、Go 套件、Cargo 套件、uv 工具、Flatpak 套件、krew kubectl 外掛以及使用 <code>brew services</code> 啟動背景服務。
