    question: "\U0001F527 Homebrew Çi Dike?"
    what: Homebrew <a href="https://formulae.brew.sh/formula/" title="List of Homebrew
      packages"> amûr û serîlêdanên rêzika fermanê yên ku hûn hewce ne</a> li macOS,
      Linux û WSL saz dike.
    how: 'Homebrew pelên li derveyî <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">pêşgira</a>
      xwe saz nake. Ew her pakêtê di <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>-ya
      xwe de di hundurê <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>-ya
      xwe de saz dike, dûv re li ku derê senîmên pelên wê tê saz kirin: pelên wê yên
      pêşînbrewx. <code>/opt/homebrew</code> li ser Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      li Linux/WSL û <code>/usr/local</code> li ser macOS Intel.'
    prefix: هۆمبریو لە ناو پێشگری خۆی زیاتر شت داناگرێت، بۆیە دەتوانیت لە هەر جێگەیەک
      بێت هۆمبریو داگریت
    createpackages: pakêtên Homebrew <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">formula
      û kasik</a> ne.
    hack: لە ژێرەوە هەمووی Git و Ruby ییە، بۆیە زانیاریەکانت بەکاربێە بۆ نوێکردنەوە
      و دەستکاری کردنیان.
