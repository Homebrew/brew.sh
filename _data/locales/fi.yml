    how: 'Homebrew ei asenna tiedostoja <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">etuliitteensä</a> ulkopuolelle. Se asentaa jokaisen paketin omaan <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>-kansioonsa <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>-kansiossa ja yhdistää sitten tiedostonsa prefix-kansioon, polkuun, johon Homebrew asennetaan: <code>/opt/homebrew</code> Apple Siliconilla, <code>/home/linuxbrew/.linuxbrew</code> Linux/WSL:ssä ja <code>/usr/local</code> macOS Intelillä.'
    prefix: Homebrew ei asenna tiedostoja etuliitteensä ulkopuolelle, ja voit valita
