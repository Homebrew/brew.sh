      <a href="https://docs.brew.sh/Acceptable-Formulae">Acceptable Formulae</a>).
      Niitä ylläpitävät Homebrew:n ylläpitäjät ja avustajat. Luo formulae <a href="https://docs.brew.sh/Formula-Cookbook">Formula
      Cookbookin</a> avulla.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      ovat pakettimääritelmiä, jotka asentavat alkupään valmiita binaaritiedostoja,
      kuten sovelluksia, fontteja ja laajennuksia.
    casks_help: Jotkut casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      ulkopuolella Homebrew, joten käytä <code>brew upgrade --greedy</code>, jos haluat
      Homebrew päivittää myös ne. Casks tiedostossa <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      vaativat ihmisen tarkastuksen ennen kuin ne hyväksytään, muutetaan tai päivitetään,
      ja niiden on täytettävä kohdan <a href="https://docs.brew.sh/Acceptable-Casks">Acceptable
      Cask</a> vaatimukset. Niitä ylläpitävät Homebrew:n ylläpitäjät ja avustajat.
      Luo casks <a href="https://docs.brew.sh/Cask-Cookbook">Cask Cookbookin</a> avulla.
    taps: Muita pakettivarastoja kutsutaan nimellä <a href="https://docs.brew.sh/Taps">taps</a>;
