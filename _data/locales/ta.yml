        நடத்தப்படுகிறது.
    formulae_title: "\U0001F4E6 Homebrew தொகுப்புகள்"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      என்பது அப்ஸ்ட்ரீம் மூலக் குறியீட்டிலிருந்து கட்டளை வரி கருவிகள், நூலகங்கள் மற்றும்
      சேவைகளை உருவாக்கும் தொகுப்பு வரையறைகள்.
    formulae_help: <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a> இல் Formulae ஏற்றுக்கொள்ளப்படுவதற்கு, மாற்றப்படுவதற்கு அல்லது புதுப்பிக்கப்படுவதற்கு முன் மனித மதிப்பாய்வு தேவைப்படுகிறது மேலும் <a href="https://wiki.debian.org/DFSGLicenses">Debian Free Software Guidelines</a>-இணக்கமான உரிமத்துடன் திறந்த மூல மென்பொருளாக இருக்க வேண்டும் (<a href="https://docs.brew.sh/Acceptable-Formulae">Acceptable Formulae</a> இல் உள்ள தேவைகளைப் பார்க்கவும்). அவை Homebrew இன் பராமரிப்பாளர்கள் மற்றும் பங்களிப்பாளர்களால் பராமரிக்கப்படுகின்றன. <a href="https://docs.brew.sh/Formula-Cookbook">Formula Cookbook</a> இன் உதவியுடன் formulae ஐ உருவாக்கவும்.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      என்பது பயன்பாடுகள், எழுத்துருக்கள் மற்றும் செருகுநிரல்கள் போன்ற அப்ஸ்ட்ரீம்
      முன்-கட்டமைக்கப்பட்ட பைனரிகளை நிறுவும் தொகுப்பு வரையறைகள் ஆகும்.
    casks_help: சில casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      Homebrewக்கு வெளியே, எனவே அவற்றையும் புதுப்பிக்க Homebrew விரும்பினால் <code>brew
      upgrade --greedy</code> ஐப் பயன்படுத்தவும். <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      இல் Casks ஏற்றுக்கொள்ளப்படுவதற்கு, மாற்றப்படுவதற்கு அல்லது புதுப்பிக்கப்படுவதற்கு
      முன் மனித மதிப்பாய்வு தேவைப்படுகிறது மேலும் <a href="https://docs.brew.sh/Acceptable-Casks">ஏற்றுக்கொள்ளக்கூடிய
      கேஸ்க்களில்</a> இல் உள்ள தேவைகளைப் பூர்த்தி செய்ய வேண்டும். அவை Homebrew இன்
      பராமரிப்பாளர்கள் மற்றும் பங்களிப்பாளர்களால் பராமரிக்கப்படுகின்றன. <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      சமையல் புத்தகம்</a> இன் உதவியுடன் casks ஐ உருவாக்கவும்.
    taps: பிற தொகுப்பு களஞ்சியங்கள் <a href="https://docs.brew.sh/Taps">taps</a> என
      அழைக்கப்படுகின்றன; அதிகாரப்பூர்வமாக ஆதரிக்கப்படும் களஞ்சியங்களுக்கு வெளியே எவரும்
      தங்கள் சொந்த formulae மற்றும் casks ஐ பராமரிக்க அனுமதிக்கிறார்கள். அதிகாரப்பூர்வமற்ற
      tapsஐப் பயன்படுத்துவதற்கு முன் <a href="https://docs.brew.sh/Tap-Trust">tap
      Trust</a> எவ்வாறு செயல்படுகிறது என்பதைப் படிக்கவும்.
    bundle_title: "\U0001F4CB Homebrew Bundle தொகுப்பு"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      அறிவிப்பு ஆகும்: நீங்கள் விரும்பும் நிலையை விவரிக்க இது <code>Brewfile</code>ஐப்
      பயன்படுத்துகிறது. விடுபட்ட சார்புகளை நிறுவவும், காலாவதியானவற்றைப் புதுப்பிக்கவும்
      மற்றும் ப்ராஜெக்ட் அல்லது மெஷின் அமைப்பை மீண்டும் மீண்டும் செய்யக்கூடியதாக வைத்திருக்கவும்
      <code>brew bundle</code>ஐ இயக்கவும்.'
    bundle_types: Homebrew Bundle ஆனது ஃபார்முலா, கேஸ்கள், டேப்ஸ், Mac App Store பயன்பாடுகள்,
      WSL இல் WinGet தொகுப்புகள், VSCode நீட்டிப்புகள், Go தொகுப்புகள், கார்கோ தொகுப்புகள்,
      uv கருவிகள், Flatpak தொகுப்புகள், krew kubectl செருகுநிரல்கள் மற்றும் <code>ப்ரூ
      சேவைகள்</code> மூலம் பின்னணி சேவைகளைத் தொடங்குவதை ஆதரிக்கிறது.
