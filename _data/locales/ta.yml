---
ta:
  locale_name: தமிழ்
  subtitle: எல்லா இடங்களுக்கும் தொகுப்பு மேலாளர்
  pagecontent:
    search: தேடு
    language: மொழி
    question: "\U0001F527 Homebrew என்ன செய்கிறது?"
    what: Homebrew macOS, Linux மற்றும் WSL முழுவதும் உங்களுக்குத் தேவையான <a href="https://formulae.brew.sh/formula/" title="List of Homebrew packages">கட்டளை வரி கருவிகள் மற்றும் பயன்பாடுகளை</a> நிறுவுகிறது.
    how: 'Homebrew அதன் <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefix</a>க்கு வெளியே கோப்புகளை நிறுவாது. இது ஒவ்வொரு தொகுப்பையும் <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>க்குள் அதன் சொந்த <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a> இல் நிறுவுகிறது, பின்னர் அதன் கோப்புகளை prefix இல் இணைக்கிறது, Homebrew நிறுவப்பட்ட பாதை: Apple Silicon இல் <code>/opt/homebrew</code>, Linux/WSL இல் <code>/home/linuxbrew/.linuxbrew</code> மற்றும் macOS Intel இல் <code>/usr/local</code>.'
    prefix: Homebrew ஆனது அதன் முன்னொட்டுக்கு வெளியே கோப்புகளை நிறுவாது மேலும் நீங்கள்
      விரும்பும் இடத்தில் Homebrew நிறுவலை வைக்கலாம்.
    createpackages: Homebrew தொகுப்புகள் <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">சூத்திரங்கள்
      மற்றும் கலசங்கள்</a> ஆகும்.
    hack: இவை அனைத்தும் Git மற்றும் Ruby யின் அடியில் உள்ளன, எனவே உங்கள் மாற்றங்களை
      எளிதாக மாற்றியமைக்கலாம் மற்றும் மேல்நிலை புதுப்பிப்புகளை ஒன்றிணைக்கலாம் என்பதை
      அறிந்துகொள்ளுங்கள்.
    formula: 'Homebrew சூத்திரங்கள் எளிய Ruby ஸ்கிரிப்டுகள்:'
    editor: "$EDITOR! இல் திறக்கப்படும்!"
    complement: Homebrew பூர்த்தி செய்கிறது macOS (அல்லது உங்கள் Linux அமைப்பை). உங்கள்
      RubyGems ஐ  <code>gem</code> மற்றும் அவற்றின் சார்புகளை <code>brew</code> மூலம்
      நிறுவவும்.
    caskinstall: '"நிறுவ, இந்த ஐகானை இழுக்கவும்..." இனி வேண்டாம். <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>
      macOS பயன்பாடுகள், எழுத்துருக்கள் மற்றும் செருகுநிரல்கள் மற்றும் பிற திறந்த
      மூல மென்பொருள்களை நிறுவுகிறது.'
    caskcreate: ஒரு கேஸ்க் தயாரிப்பது ஒரு சூத்திரத்தை உருவாக்குவது போல எளிது.
    install:
      install: "\U0001F680 Homebrew ஐ நிறுவவும்"
      paste: macOS முனையத்தில், Linux ஷெல் அல்லது WSL என்பதை ஒட்டவும்.
      what: ஸ்கிரிப்ட் அது என்ன செய்யும் என்பதை விளக்குகிறது மற்றும் அதைச் செய்வதற்கு
        முன் இடைநிறுத்தப்படுகிறது. பிற <a href="https://docs.brew.sh/Installation">நிறுவல்
        விருப்பங்கள்</a> பற்றி படிக்கவும்.
      pkginstaller: நீங்கள் macOS இல் இருந்தால், ஊடாடும் அல்லது கவனிக்கப்படாத MDM
        நிறுவல்களுக்கு எங்கள் <code>.pkg</code> நிறுவியை முயற்சிக்கவும்.
      githubrelease: <a href="https://github.com/Homebrew/brew/releases/latest">Homebrew
        இன் சமீபத்திய GitHub வெளியீடு</a> இலிருந்து பதிவிறக்கவும்.
      supported: Homebrew <a href="https://docs.brew.sh/Support-Tiers">supports</a>
        macOS (Sonoma 14 மற்றும் புதியது), Linux மற்றும் Windows Subsystem for Linux
        (WSL).
    doc:
      man: <a href="https://docs.brew.sh/Manpage"><code>man brew</code></a> உடன் Homebrew
        கையேட்டைப் படிக்கவும்.
      further: மேலும் ஆவணப்படுத்தல்
      donate: "\U0001F4B8 Homebrewக்கு நன்கொடை அளியுங்கள்"
      blog: Homebrew வலைப்பதிவு
      community: உதவி பெறவும்
      formulae: Homebrew தொகுப்புகள்
      analytics: பகுப்பாய்வு தரவு
      resources: Homebrew வளங்கள்
      documentation: ஆவணங்கள்
      man_summary: 
      further_summary: <a href="https://docs.brew.sh/Installation">installation</a>, <a href="https://docs.brew.sh/Troubleshooting">சிக்கல் தீர்க்க</a>, <a href="https://github.com/Homebrew/brew/blob/HEAD/docs/How-To-Open-a-Homebrew-Pull-Request.md">contribution</a> மற்றும் <a href="https://docs.brew.sh/Formula-Cookbook">development</a> வழிகாட்டிகளை, <a href="https://docs.brew.sh/FAQ">FAQ (Frequently Asked Questions)</a> உட்பட, <a href="https://docs.brew.sh/">docs.brew.sh</a> இல் படிக்கவும்.
      donate_summary: Homebrew என்பது முற்றிலும் தன்னார்வலர்களால் நடத்தப்படும் ஒரு
        இலாப நோக்கற்ற திட்டமாகும், ஊழியர்கள் அல்ல. திட்டத்திற்கான தொடர்ச்சியான ஒருங்கிணைப்பு
        மற்றும் எதிர்கால மேம்பாடுகளைச் சுற்றியுள்ள மென்பொருள், வன்பொருள் மற்றும் ஹோஸ்டிங்
        ஆகியவற்றிற்கு பணம் செலுத்த உங்கள் நிதி தேவை. ஒவ்வொரு நன்கொடையும் Homebrewஐ
        எங்கள் பயனர்களுக்குச் சிறந்ததாக்க செலவிடப்படும். <a href="https://github.com/sponsors/Homebrew">GitHub
        ஸ்பான்சர்ஸ்</a>, <a href="https://opencollective.com/homebrew">Open Collective</a>
        அல்லது <a href="https://www.patreon.com/homebrew">Patreon</a> மூலம் வழக்கமான
        நன்கொடையைப் பரிசீலிக்கவும். Homebrew நிதி ரீதியாக <a href="https://opencollective.com/opensource">ஓப்பன்
        சோர்ஸ் கலெக்டிவ்</a> மூலம் வழங்கப்படுகிறது.
      blog_summary: வெளியீட்டுக் குறிப்புகள், திட்டப் புதுப்பிப்புகள் மற்றும் அறிவிப்புகளுக்கு
        <a href="/blog/">Homebrew Blog</a> ஐப் படிக்கவும்.
      community_summary: ஏதேனும் கேள்வி உள்ளதா அல்லது சிக்கலை எங்கு புகாரளிப்பது என்பதைத்
        தேர்ந்தெடுப்பதற்கான உதவி தேவையா? Homebrew இன் <a href="https://github.com/orgs/Homebrew/discussions">
        விவாதங்கள்</a> அல்லது <a href="https://github.com/Homebrew/brew/issues/new/choose">புதிய
        வெளியீடு படிவம்</a> உடன் தொடங்கவும்.
      social: சமூக ஊடகம்
      social_summary: "<a href=\"https://fosstodon.org/@homebrew\">Mastodon</a>, <a
        href=\"https://bsky.app/profile/brew.sh\">Bluesky</a> அல்லது <a href=\"https://x.com/MacHomebrew\">\U0001D54F
        (Twitter)</a> இல் Homebrew ஐப் பின்தொடரவும் அல்லது <a href=\"https://buttondown.email/homebrew\">செய்திமடலுக்கு</a>க்கு
        குழுசேரவும்."
      formulae_summary: <a href="https://formulae.brew.sh/formula/">formulae</a>,
        <a href="https://formulae.brew.sh/cask/">casks</a>, சார்புகள், பதிப்புகள்
        மற்றும் தொகுப்பு மெட்டாடேட்டாவை <a href="https://formulae.brew.sh/">formulae.brew.sh</a>
        இல் கண்டறியவும்.
      analytics_summary: <a href="https://formulae.brew.sh/analytics/">formulae.brew.sh/analytics</a>
        இல் அநாமதேய நிறுவல், உருவாக்கம் மற்றும் இயக்க முறைமை பயன்பாட்டுத் தரவைப் பார்க்கவும்.
        Homebrew <a href="https://docs.brew.sh/Analytics">அநாமதேய பகுப்பாய்வு</a>ஐ
        எவ்வாறு பயன்படுத்துகிறது என்பதைப் படிக்கவும்.
