  pagecontent:
    search: Pesquisar
    language: Idioma
    question: "\U0001F527 O que Homebrew faz?"
    what: Homebrew instala <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">as ferramentas e aplicativos de linha de comando necessários</a>
      em macOS, Linux e WSL.
    how: 'Homebrew não instalará arquivos fora de seu <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefix</a>.
      Ele instala cada pacote em seu próprio <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      dentro de <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>
      e, em seguida, vincula seus arquivos ao prefix, o caminho onde Homebrew está
      instalado: <code>/opt/homebrew</code> em Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code>
      em Linux/WSL e <code>/usr/local</code> em macOS Intel.'
    prefix: O Homebrew não instala arquivos fora de sua estrutura, e você pode colocar
      a instalação do Homebrew onde desejar.
    createpackages: Os pacotes Homebrew são <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">formulae
      e barris</a>.
    hack: 'O Homebrew é baseado unicamente em Git e Ruby: agora você pode desenvolver
      tranquilo, com a certeza de que você pode desfazer as alterações e integrar
      atualizações com facilidade.'
    formula: 'Homebrew formulas são simples scripts em Ruby:'
    editor: abra no $EDITOR!
    complement: O Homebrew complementa o macOS. Instale suas RubyGems com <code>gem</code>,
      e suas dependências com <code>brew</code>.
    caskinstall: “Para instalar, arraste este icone…” não mais. <a href="https://formulae.brew.sh/cask/">Homebrew&nbsp;Cask</a>
      instala macOS apps, fontes e plugins, e outros programas não open source.
    caskcreate: Fazer um cask é tão simples quanto criar uma fórmula.
    install:
      install: "\U0001F680 Instale Homebrew"
      paste: Cole isso no Terminal macOS, um shell Linux ou WSL.
      what: O script explica o que fará e depois faz uma pausa antes de fazê-lo. Leia
        sobre outras <a href="https://docs.brew.sh/Installation">opções de instalação</a>.
      pkginstaller: Se você estiver em macOS, experimente nosso instalador <code>.pkg</code>
        para instalações MDM interativas ou autônomas.
      githubrelease: Faça o download da <a href="https://github.com/Homebrew/brew/releases/latest">versão mais recente do Homebrew no GitHub</a>.
      supported: Homebrew <a href="https://docs.brew.sh/Support-Tiers">suporta</a>
        macOS (Sonoma 14 e mais recente), Linux e Windows Subsystem for Linux (WSL).
    doc:
