      donate_summary: Homebrew é um projeto sem fins lucrativos administrado inteiramente
        por voluntários, não por funcionários. Precisamos de seus fundos para pagar
        software, hardware e hospedagem para integração contínua e melhorias futuras
        no projeto. Cada doação será gasta para tornar Homebrew melhor para nossos
        usuários. Por favor, considere uma doação regular através de <a href="https://github.com/sponsors/Homebrew">Patrocinadores
        do GitHub</a>, <a href="https://opencollective.com/homebrew">Open Collective</a>
        ou <a href="https://www.patreon.com/homebrew">Patreon</a>. Homebrew é hospedado
        fiscalmente pelo <a href="https://opencollective.com/opensource">Open Source
        Collective</a>.
