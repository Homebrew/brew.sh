    formulae_title: "\U0001F4E6 Pacotes do Homebrew"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      são definições de pacote que constroem ferramentas de linha de comando, bibliotecas
      e serviços a partir do código-fonte upstream.
    formulae_help: Formulae em <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      requerem revisão humana antes de serem aceitos, alterados ou atualizados e devem
      ser software de código aberto com uma licença compatível com <a href="https://wiki.debian.org/DFSGLicenses">Diretrizes
      de Software Livre Debian</a> (veja os requisitos em <a href="https://docs.brew.sh/Acceptable-Formulae">Fórmulas
      Aceitáveis</a>). Eles são mantidos pelos mantenedores e colaboradores de Homebrew.
      Crie formulae com a ajuda do <a href="https://docs.brew.sh/Formula-Cookbook">Formula
      Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      são definições de pacotes que instalam binários pré-construídos upstream, como
      aplicativos, fontes e plug-ins.
    casks_help: Alguns casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      fora de Homebrew, então use <code>brew upgrade --greedy</code> se quiser que
      Homebrew os atualize também. Casks em <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      requerem revisão humana antes de serem aceitos, alterados ou atualizados e devem
      atender aos requisitos em <a href="https://docs.brew.sh/Acceptable-Casks">Casks
      Aceitáveis</a>. Eles são mantidos pelos mantenedores e colaboradores de Homebrew.
      Crie casks com a ajuda do <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      Cookbook</a>.
    taps: Outros repositórios de pacotes são chamados <a href="https://docs.brew.sh/Taps">taps</a>;
      eles permitem que qualquer pessoa mantenha seus próprios formulae e casks fora
      dos repositórios oficialmente suportados. Leia como <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a> funciona antes de usar taps não oficial e aprenda como <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">criar
      e manter um tap</a>.
    bundle_title: "\U0001F4CB Pacote Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      é declarativo: usa um <code>Brewfile</code> para descrever o estado que você
      deseja. Execute <code>brew bundle</code> para instalar dependências ausentes,
      atualizar dependências desatualizadas e manter a configuração do projeto ou
      da máquina repetível.'
    bundle_types: Homebrew Bundle suporta aplicativos formulae, casks, taps, Mac App
      Store, pacotes WinGet em WSL, extensões VSCode, pacotes Go, pacotes Cargo, ferramentas
      uv, pacotes Flatpak, plug-ins krew kubectl e iniciar serviços em segundo plano
      com <code>serviços de cerveja</code>.
