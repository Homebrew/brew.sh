    question: "\U0001F527 Apa yang Homebrew Lakukan?"
    what: Homebrew menginstal <a href="https://formulae.brew.sh/formula/" title="List
      of Homebrew packages">alat dan aplikasi baris perintah yang Anda perlukan</a>
      di macOS, Linux, dan WSL.
    how: 'Homebrew tidak akan menginstal file di luar <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">prefix</a>-nya.
      Ia menginstal setiap paket ke dalam <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">keg</a>
      miliknya sendiri di dalam <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Cellar</a>,
      lalu menghubungkan file-filenya ke prefix, jalur tempat Homebrew diinstal: <code>/opt/homebrew</code>
      di Apple Silicon, <code>/home/linuxbrew/.linuxbrew</code> di Linux/WSL dan <code>/usr/local</code>
      di macOS Intel.'
    prefix: Homebrew tidak akan menginstal file di luar prefixnya dan Anda dapat menempatkan
      instalasi Homebrew di mana pun Anda suka.
    createpackages: Paket Homebrew adalah <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">formula
      dan tong</a>.
    hack: Semuanya ada di bawah Git dan Ruby, jadi retaslah dengan pengetahuan bahwa
      Anda dapat dengan mudah mengembalikan modifikasi Anda dan menggabungkan pembaruan
      upstream.
    formula: 'Formulae Homebrew adalah skrip Ruby sederhana:'
    editor: dibuka di $EDITOR!
    complement: Homebrew melengkapi macOS (atau sistem Linux Anda). Instal RubyGems
      Anda dengan <code>gem</code> dan dependensinya dengan <code>brew</code>.
    caskinstall: Tidak ada lagi "Untuk menginstal, seret ikon ini ...". <a href="https://formulae.brew.sh/cask/">Homebrew Cask</a>
      menginstal aplikasi macOS, font dan plugin, serta software non-sumber terbuka
      lainnya.
    caskcreate: Membuat sebuah cask semudah membuat formula.
    install:
      install: "\U0001F680 Instal Homebrew"
      paste: Tempelkan itu di Terminal macOS, shell Linux atau WSL.
      what: Skrip menjelaskan apa yang akan dilakukannya dan kemudian berhenti sejenak
        sebelum melakukannya. Baca tentang <a href="https://docs.brew.sh/Installation">opsi
        instalasi</a> lainnya.
      pkginstaller: Jika Anda menggunakan macOS, coba penginstal <code>.pkg</code>
        kami untuk penginstalan MDM yang interaktif atau tanpa pengawasan.
      githubrelease: Unduh dari rilis GitHub terbaru <a href="https://github.com/Homebrew/brew/releases/latest">Homebrew</a>.
      supported: Homebrew <a href="https://docs.brew.sh/Support-Tiers">mendukung</a>
        macOS (Sonoma 14 dan lebih baru), Linux dan Windows Subsystem for Linux (WSL).
