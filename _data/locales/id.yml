    formulae_title: "\U0001F4E6 Paket Homebrew"
    formulae: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Formulae</a>
      adalah definisi paket yang membangun alat baris perintah, pustaka, dan layanan
      dari kode sumber upstream.
    formulae_help: Formulae di <a href="https://github.com/Homebrew/homebrew-core">homebrew/core</a>
      memerlukan tinjauan manusia sebelum diterima, diubah, atau diperbarui dan harus
      berupa perangkat lunak sumber terbuka dengan lisensi yang kompatibel dengan
      <a href="https://wiki.debian.org/DFSGLicenses">Pedoman Perangkat Lunak Bebas
      Debian</a> (lihat persyaratan di <a href="https://docs.brew.sh/Acceptable-Formulae">Formula
      yang Dapat Diterima</a>). Mereka dikelola oleh pengelola dan kontributor Homebrew.
      Buat formulae dengan bantuan dari <a href="https://docs.brew.sh/Formula-Cookbook">Formula
      Cookbook</a>.
    casks: <a href="https://docs.brew.sh/Formula-Cookbook#homebrew-terminology">Casks</a>
      adalah definisi paket yang menginstal biner hulu yang sudah dibuat sebelumnya
      seperti aplikasi, font, dan plugin.
    casks_help: Beberapa casks <a href="https://docs.brew.sh/Cask-Cookbook#stanza-auto_updates">auto-update</a>
      di luar Homebrew, jadi gunakan <code>brew upgrade --greedy</code> jika Anda
      ingin Homebrew memperbaruinya juga. Casks di <a href="https://github.com/Homebrew/homebrew-cask">homebrew/cask</a>
      memerlukan tinjauan manusia sebelum diterima, diubah, atau diperbarui dan harus
      memenuhi persyaratan dalam <a href="https://docs.brew.sh/Acceptable-Casks">Tong
      yang Dapat Diterima</a>. Mereka dikelola oleh pengelola dan kontributor Homebrew.
      Buat casks dengan bantuan dari <a href="https://docs.brew.sh/Cask-Cookbook">Cask
      Cookbook</a>.
    taps: Repositori paket lainnya disebut <a href="https://docs.brew.sh/Taps">taps</a>;
      mereka membiarkan siapa pun memelihara formulae dan casks mereka sendiri di
      luar repositori yang didukung secara resmi. Baca cara kerja <a href="https://docs.brew.sh/Tap-Trust">tap
      trust</a> sebelum menggunakan taps tidak resmi, lalu pelajari cara <a href="https://docs.brew.sh/How-to-Create-and-Maintain-a-Tap">membuat
      dan memelihara tap</a>.
    bundle_title: "\U0001F4CB Paket Homebrew Bundle"
    bundle: '<a href="https://docs.brew.sh/Brew-Bundle-and-Brewfile">Homebrew Bundle</a>
      bersifat deklaratif: menggunakan <code>Brewfile</code> untuk mendeskripsikan
      keadaan yang Anda inginkan. Jalankan <code>brew bundle</code> untuk menginstal
      dependensi yang hilang, perbarui dependensi yang sudah ketinggalan zaman, dan
      jaga agar penyiapan proyek atau mesin tetap dapat diulang.'
    bundle_types: Homebrew Bundle mendukung aplikasi formulae, casks, taps, Mac App
      Store, paket WinGet di WSL, ekstensi VSCode, paket Go, paket Cargo, alat uv,
      paket Flatpak, plugin krew kubectl dan memulai layanan latar belakang dengan
      <code>layanan pembuatan bir</code>.
